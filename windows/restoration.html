<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>修复台</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="header">
    <h1>🔧 修复台</h1>
    <div class="status-bar">
      <div class="status-item">
        <span class="status-icon">💰</span>
        <span class="status-value" id="budget">50,000</span>
      </div>
      <div class="status-item">
        <span class="status-icon">⚙️</span>
        <span class="status-value" id="currentStep">选择任务</span>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div id="noTaskPanel" class="card">
      <div class="card-title">📋 选择修复任务</div>
      <p style="margin-bottom: 15px; color: #a08060;">请从任务档案中选择一个任务开始修复，或快速选择下方任务：</p>
      <div id="quickTasks" class="grid-3"></div>
    </div>

    <div id="taskPanel" style="display: none;">
      <div class="steps-indicator" id="stepsIndicator"></div>

      <div class="grid-2">
        <div class="card">
          <div class="card-title">
            🏺 当前文物
            <button class="btn" style="float: right; padding: 3px 10px; font-size: 11px;" onclick="showLabReports()">📄 检测报告</button>
          </div>
          <div id="artifactInfo"></div>
        </div>

        <div class="card">
          <div class="card-title">📊 修复进度</div>
          <div style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
              <span>总进度</span>
              <span id="progressText">0%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
          </div>
          <div id="stepsList"></div>
          <div style="margin-top: 10px;">
            <p style="font-size: 12px; color: #a08060; margin-bottom: 5px;">材料库存：</p>
            <div id="materialStatus" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">
          🛠️ 工具栏
          <span style="float: right; font-size: 12px; color: #a08060;">当前材料消耗：<span id="currentCost">无</span></span>
        </div>
        <div class="toolbar" id="toolbar"></div>
        <div class="slider-container" style="margin-top: 15px;">
          <label>工具力度</label>
          <input type="range" id="forceSlider" min="1" max="10" value="5">
          <span id="forceValue">5</span>
          <span id="forceHint" style="margin-left: 15px; font-size: 11px; color: #a08060;">适中</span>
        </div>
        <div id="materialSelect" style="margin-top: 15px; display: none;">
          <p style="font-size: 12px; color: #a08060; margin-bottom: 8px;">选择使用材料：</p>
          <div id="materialOptions" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
        </div>
      </div>

      <div class="card" id="workAreaCard">
        <div class="card-title">
          <span id="workAreaTitle">工作台</span>
          <div style="float: right;">
            <button class="btn" onclick="changeZoom(1)">🔍+ 放大</button>
            <button class="btn" onclick="changeZoom(-1)">🔍- 缩小</button>
          </div>
        </div>
        <div class="restoration-area" id="restorationArea">
          <div id="artifactDisplay" class="artifact-display">🏺</div>
        </div>
      </div>

      <div id="emergencyPanel" class="card" style="display: none; border-color: #f44336;">
        <div class="card-title" style="color: #f44336;">⚠️ 突发情况！</div>
        <div id="emergencyContent"></div>
      </div>

      <div style="text-align: center; margin-top: 20px;">
        <button class="btn" onclick="prevStep()" id="prevStepBtn" style="display: none; margin-right: 10px;">← 上一步</button>
        <button class="btn btn-primary" id="nextStepBtn" onclick="nextStep()" style="display: none;">下一步 →</button>
        <button class="btn btn-primary" id="completeBtn" onclick="completeRestoration()" style="display: none;">✅ 完成修复</button>
        <button class="btn btn-danger" onclick="cancelTask()" style="margin-left: 10px;">❌ 放弃任务</button>
      </div>
    </div>
  </div>

  <div id="notificationContainer"></div>

  <script src="../data/game-data.js"></script>
  <script>
    const { ipcRenderer } = require('electron');

    let currentTask = null;
    let currentStepIndex = 0;
    let zoomLevel = 1;
    let toolForce = 5;
    let selectedTool = null;
    let selectedMaterial = null;
    let stepsProgress = {};
    let damageSpots = [];
    let puzzlePieces = [];
    let restorationLog = [];
    let gameState = null;
    let currentEmergency = null;
    let usedMaterials = {};
    let forceQualityModifier = 1;
    let emergencyPenalty = 0;
    let toolBonus = {
      microscopeUsed: false,
      laserUsed: false,
      xrayUsed: false,
      uvUsed: false
    };
    let forceStats = {
      perfectCount: 0,
      tooLightCount: 0,
      tooHeavyCount: 0,
      totalActions: 0
    };
    let observeDetails = [];
    let cleanEfficiency = 1;

    const RESTORATION_STEPS = [
      { id: 'observe', name: '观察', icon: '👁️', desc: '仔细观察文物，记录破损情况', consume: null },
      { id: 'clean', name: '清洁', icon: '🧹', desc: '清理表面污渍和锈蚀', consume: 'clean' },
      { id: 'assemble', name: '拼合', icon: '🧩', desc: '拼接破碎的碎片', consume: 'assemble' },
      { id: 'fill', name: '补配', icon: '🔨', desc: '填补缺失部分', consume: 'fill' },
      { id: 'color', name: '上色', icon: '🎨', desc: '调配颜料进行全色', consume: 'color' },
      { id: 'protect', name: '封护', icon: '🛡️', desc: '施加保护层', consume: 'protect' }
    ];

    const EMERGENCY_TYPES = {
      clean: [
        { 
          id: 'crack', 
          name: '出现新裂纹！', 
          desc: '清洁力度过大导致文物表面出现细微裂纹',
          options: [
            { text: '使用柔性填充剂修补', cost: { material: 'softFiller', amount: 1 }, effect: '补救成功，轻微影响' },
            { text: '忽略继续', cost: null, effect: '严重影响修复质量' }
          ]
        }
      ],
      assemble: [
        {
          id: 'misalign',
          name: '碎片错位！',
          desc: '拼接位置不准确，可能影响整体结构',
          options: [
            { text: '拆开重新拼接', cost: { material: 'adhesive', amount: 1 }, effect: '补救成功，消耗额外粘合剂' },
            { text: '强行固定', cost: null, effect: '修复质量下降' }
          ]
        }
      ],
      color: [
        {
          id: 'color_diff',
          name: '色差过大！',
          desc: '颜料调配不当，与原色差异明显',
          options: [
            { text: '使用颜料清除剂去除', cost: { material: 'paintRemover', amount: 1 }, effect: '清除后重新上色' },
            { text: '尝试叠色修正', cost: { material: 'pigment', amount: 1 }, effect: '效果一般，勉强接受' }
          ]
        }
      ]
    };

    async function init() {
      gameState = await getGameState();
      updateStatus();
      
      if (gameState.currentTask) {
        loadTask(gameState.currentTask);
      } else {
        loadQuickTasks();
      }

      document.getElementById('forceSlider').addEventListener('input', (e) => {
        toolForce = parseInt(e.target.value);
        document.getElementById('forceValue').textContent = toolForce;
        updateForceHint();
      });
    }

    function updateStatus() {
      document.getElementById('budget').textContent = gameState.budget.toLocaleString();
      updateMaterialStatus();
    }

    function updateForceHint() {
      const hintEl = document.getElementById('forceHint');
      if (toolForce <= 2) {
        hintEl.textContent = '过轻 - 进度缓慢';
        hintEl.style.color = '#2196f3';
      } else if (toolForce <= 4) {
        hintEl.textContent = '较轻 - 安全范围';
        hintEl.style.color = '#4caf50';
      } else if (toolForce <= 6) {
        hintEl.textContent = '适中 - 推荐';
        hintEl.style.color = '#4caf50';
      } else if (toolForce <= 8) {
        hintEl.textContent = '较重 - 注意风险';
        hintEl.style.color = '#ff9800';
      } else {
        hintEl.textContent = '过重 - 高风险！';
        hintEl.style.color = '#f44336';
      }
    }

    function updateMaterialStatus() {
      const container = document.getElementById('materialStatus');
      if (!container) return;
      const materialsInfo = getMaterialsInfo();
      const stepCost = getStepMaterialCost();
      const currentStep = RESTORATION_STEPS[currentStepIndex];
      
      if (currentStep.consume && stepCost[currentStep.consume]) {
        const cost = stepCost[currentStep.consume];
        const mainMat = gameState.materials[cost.material] || 0;
        const altMat = cost.alt ? (gameState.materials[cost.alt] || 0) : null;
        
        let html = `<span style="font-size: 11px;">${materialsInfo[cost.material]?.name}: ${mainMat}</span>`;
        if (altMat !== null) {
          html += `<span style="font-size: 11px; color: #d4af37;">${materialsInfo[cost.alt]?.name}: ${altMat}</span>`;
        }
        container.innerHTML = html;
      } else {
        container.innerHTML = '<span style="font-size: 11px; color: #a08060;">本步骤无需耗材</span>';
      }
    }

    function loadQuickTasks() {
      const tasks = getTasks();
      const container = document.getElementById('quickTasks');
      container.innerHTML = '';
      const completedIds = gameState.completedTasks.map(t => t.id);
      
      tasks.filter(t => !completedIds.includes(t.id)).forEach(task => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.style.cursor = 'pointer';
        card.innerHTML = `
          <div class="item-icon">${task.artifact.image}</div>
          <div class="item-name">${task.title}</div>
          <div class="item-meta">
            <span class="tag tag-era">${task.artifact.era}</span>
            <span class="tag tag-difficulty">难度 ${'★'.repeat(task.difficulty)}</span>
          </div>
          <div style="text-align: center; margin-top: 10px;">
            <span style="color: #d4af37;">💰 ${task.baseReward.toLocaleString()}</span>
          </div>
        `;
        card.onclick = () => selectTask(task);
        container.appendChild(card);
      });
    }

    async function selectTask(task) {
      currentTask = task;
      currentStepIndex = 0;
      stepsProgress = {};
      damageSpots = [];
      puzzlePieces = [];
      restorationLog = [];
      usedMaterials = {};
      emergencyPenalty = 0;
      forceQualityModifier = 1;
      currentEmergency = null;
      selectedTool = null;
      selectedMaterial = null;
      selectedPiece = null;
      selectedColor = null;
      zoomLevel = 1;
      toolForce = 5;
      toolBonus = {
        microscopeUsed: false,
        laserUsed: false,
        xrayUsed: false,
        uvUsed: false
      };
      forceStats = {
        perfectCount: 0,
        tooLightCount: 0,
        tooHeavyCount: 0,
        totalActions: 0
      };
      observeDetails = [];
      cleanEfficiency = 1;
      await ipcRenderer.invoke('set-current-task', task);
      loadTask(task);
      addLog('系统', '开始修复任务：' + task.title);
      showNotification('任务已开始：' + task.title);
    }

    function loadTask(task) {
      document.getElementById('noTaskPanel').style.display = 'none';
      document.getElementById('taskPanel').style.display = 'block';
      
      renderArtifactInfo(task.artifact);
      renderStepsIndicator();
      renderStepsList();
      loadStep(0);
    }

    function renderArtifactInfo(artifact) {
      const info = document.getElementById('artifactInfo');
      info.innerHTML = `
        <div style="text-align: center; margin-bottom: 15px;">
          <div style="font-size: 72px;">${artifact.image}</div>
        </div>
        <h3 style="color: #d4af37; margin-bottom: 10px;">${artifact.name}</h3>
        <p style="margin-bottom: 10px;">
          <span class="tag tag-era">${artifact.era}</span>
          <span class="tag tag-era">${artifact.material}</span>
          <span class="tag tag-difficulty">稀有度 ${'★'.repeat(artifact.rarity)}</span>
        </p>
        <p style="font-size: 13px; color: #a08060; margin-bottom: 10px;">${artifact.description}</p>
        <div style="margin-top: 10px;">
          <strong>破损情况：</strong>
          ${artifact.damage.map(d => `<span class="tag tag-damage">${d}</span>`).join('')}
        </div>
      `;
    }

    function renderStepsIndicator() {
      const container = document.getElementById('stepsIndicator');
      container.innerHTML = RESTORATION_STEPS.map((step, i) => `
        <div class="step-dot ${i < currentStepIndex ? 'completed' : i === currentStepIndex ? 'active' : ''}" 
             title="${step.name}">
          ${step.icon}
        </div>
      `).join('');
    }

    function renderStepsList() {
      const container = document.getElementById('stepsList');
      container.innerHTML = RESTORATION_STEPS.map((step, i) => {
        const stepCost = getStepMaterialCost();
        const cost = step.consume ? stepCost[step.consume] : null;
        const matInfo = cost ? getMaterialsInfo()[cost.material] : null;
        
        return `
        <div class="list-item" style="opacity: ${i <= currentStepIndex ? 1 : 0.5}">
          <div>
            <span>${step.icon} ${step.name}</span>
            <span style="color: #a08060; font-size: 12px; margin-left: 10px;">${step.desc}</span>
            ${matInfo ? `<span style="color: #ff9800; font-size: 10px; margin-left: 10px;">消耗: ${matInfo.name} x${cost.amount}</span>` : ''}
          </div>
          <span>${stepsProgress[step.id] ? '✅' : i === currentStepIndex ? '⏳' : '⬜'}</span>
        </div>
      `}).join('');
    }

    function updateProgress() {
      const completed = Object.keys(stepsProgress).length;
      const total = RESTORATION_STEPS.length;
      const percent = Math.round((completed / total) * 100);
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressText').textContent = percent + '%';
    }

    function loadStep(index) {
      currentStepIndex = index;
      const step = RESTORATION_STEPS[index];
      document.getElementById('currentStep').textContent = step.name;
      document.getElementById('workAreaTitle').textContent = step.name + ' - ' + step.desc;
      document.getElementById('currentCost').textContent = step.consume ? getConsumeText(step.consume) : '无';
      
      renderStepsIndicator();
      renderStepsList();
      renderToolbar(step.id);
      renderMaterialSelect(step.id);
      renderWorkArea(step.id);
      updateMaterialStatus();
      
      document.getElementById('prevStepBtn').style.display = index > 0 && !currentEmergency ? 'inline-block' : 'none';
      document.getElementById('nextStepBtn').style.display = index < RESTORATION_STEPS.length - 1 && stepsProgress[step.id] && !currentEmergency ? 'inline-block' : 'none';
      document.getElementById('completeBtn').style.display = index === RESTORATION_STEPS.length - 1 && stepsProgress[step.id] && !currentEmergency ? 'inline-block' : 'none';
    }

    function getConsumeText(consumeKey) {
      const stepCost = getStepMaterialCost();
      const cost = stepCost[consumeKey];
      const materialsInfo = getMaterialsInfo();
      let text = materialsInfo[cost.material]?.name + ' x' + cost.amount;
      if (cost.alt) {
        text += ' / ' + materialsInfo[cost.alt]?.name;
      }
      return text;
    }

    function renderToolbar(stepId) {
      const toolbar = document.getElementById('toolbar');
      const tools = getAvailableTools(stepId);
      toolbar.innerHTML = tools.map(tool => `
        <button class="tool-btn ${selectedTool === tool.id ? 'active' : ''}" 
                onclick="selectTool('${tool.id}')"
                ${!tool.unlocked ? 'disabled' : ''}>
          <span class="tool-icon">${tool.icon}</span>
          <span class="tool-name">${tool.name}</span>
          ${!tool.unlocked ? '<span style="font-size: 10px; color: #f44;">🔒</span>' : ''}
          ${tool.bonus ? `<span style="font-size: 10px; color: #4caf50;">+${tool.bonus}</span>` : ''}
        </button>
      `).join('');
    }

    function getAvailableTools(stepId) {
      const tools = gameState.tools;
      const toolMap = {
        observe: [
          { id: 'magnifier', name: '放大镜', icon: '🔍', unlocked: true, bonus: null },
          { id: 'microscope', name: '显微镜', icon: '🔬', unlocked: tools.microscope?.unlocked, bonus: '精度+20%' },
          { id: 'xray', name: 'X光透视', icon: '📷', unlocked: tools.xrayMachine?.unlocked, bonus: '发现隐藏损伤' }
        ],
        clean: [
          { id: 'brush', name: '软毛刷', icon: '🖌️', unlocked: true, bonus: null },
          { id: 'sponge', name: '海绵', icon: '🧽', unlocked: true, bonus: null },
          { id: 'laser', name: '激光清洗', icon: '💫', unlocked: tools.laserCleaner?.unlocked, bonus: '无损+30%' }
        ],
        assemble: [
          { id: 'tweezers', name: '镊子', icon: '🗜️', unlocked: true, bonus: null },
          { id: 'adhesive_tool', name: '粘合剂', icon: '🧴', unlocked: true, bonus: null }
        ],
        fill: [
          { id: 'spatula', name: '刮刀', icon: '🥄', unlocked: true, bonus: null },
          { id: 'filler_tool', name: '填充剂', icon: '🧱', unlocked: true, bonus: null }
        ],
        color: [
          { id: 'paint_brush', name: '画笔', icon: '🖌️', unlocked: true, bonus: null },
          { id: 'palette', name: '调色板', icon: '🎨', unlocked: true, bonus: null }
        ],
        protect: [
          { id: 'spray', name: '喷枪', icon: '🧴', unlocked: true, bonus: null },
          { id: 'uv_lamp', name: 'UV固化', icon: '💡', unlocked: tools.uvLamp?.unlocked, bonus: '固化+25%' }
        ]
      };
      return toolMap[stepId] || [];
    }

    function selectTool(toolId) {
      selectedTool = toolId;
      const stepId = RESTORATION_STEPS[currentStepIndex].id;
      renderToolbar(stepId);
      renderWorkArea(stepId);
      showNotification('已选择工具');
    }

    function renderMaterialSelect(stepId) {
      const container = document.getElementById('materialSelect');
      const optionsContainer = document.getElementById('materialOptions');
      const stepCost = getStepMaterialCost();
      const materialsInfo = getMaterialsInfo();
      
      const step = RESTORATION_STEPS.find(s => s.id === stepId);
      
      if (step.consume && stepCost[step.consume]) {
        const cost = stepCost[step.consume];
        container.style.display = 'block';
        
        let options = [];
        
        if (cost.alt && gameState.materials[cost.alt] > 0) {
          options.push(`
            <button class="btn ${selectedMaterial === cost.alt ? 'btn-primary' : ''}" 
                    style="padding: 5px 12px; font-size: 12px;"
                    onclick="selectMaterial('${cost.alt}')">
              ✨ ${materialsInfo[cost.alt]?.name} (${gameState.materials[cost.alt]})
            </button>
          `);
        }
        
        options.push(`
          <button class="btn ${selectedMaterial === cost.material || (!cost.alt && !selectedMaterial) ? 'btn-primary' : ''}" 
                  style="padding: 5px 12px; font-size: 12px;"
                  onclick="selectMaterial('${cost.material}')">
            📦 ${materialsInfo[cost.material]?.name} (${gameState.materials[cost.material] || 0})
          </button>
        `);
        
        optionsContainer.innerHTML = options.join('');
      } else {
        container.style.display = 'none';
      }
    }

    function selectMaterial(matKey) {
      selectedMaterial = matKey;
      const stepId = RESTORATION_STEPS[currentStepIndex].id;
      renderMaterialSelect(stepId);
    }

    async function checkAndConsumeMaterial(amountMultiplier = 1) {
      const step = RESTORATION_STEPS[currentStepIndex];
      if (!step.consume) return { success: true };
      
      const stepCost = getStepMaterialCost();
      const cost = stepCost[step.consume];
      
      let matToUse = selectedMaterial || cost.material;
      
      if (cost.alt && matToUse === cost.alt) {
        if (gameState.materials[cost.alt] > 0) {
          const useAmount = Math.ceil(amountMultiplier);
          const result = await ipcRenderer.invoke('use-material', cost.alt, useAmount);
          if (result.success) {
            gameState.materials = result.materials;
            usedMaterials[cost.alt] = (usedMaterials[cost.alt] || 0) + useAmount;
            addLog('材料', `使用 ${getMaterialsInfo()[cost.alt]?.name} x${useAmount}`);
            return { success: true, bonus: true };
          }
        }
      }
      
      const actualAmount = Math.ceil(cost.amount * amountMultiplier);
      if (gameState.materials[cost.material] < actualAmount) {
        showNotification(`材料不足：${getMaterialsInfo()[cost.material]?.name}，请前往材料柜购买！`, 'error');
        return { success: false };
      }
      
      const result = await ipcRenderer.invoke('use-material', cost.material, actualAmount);
      if (result.success) {
        gameState.materials = result.materials;
        usedMaterials[cost.material] = (usedMaterials[cost.material] || 0) + actualAmount;
        addLog('材料', `使用 ${getMaterialsInfo()[cost.material]?.name} x${actualAmount}`);
        updateStatus();
        return { success: true };
      }
      
      return { success: false };
    }

    function renderWorkArea(stepId) {
      const area = document.getElementById('restorationArea');
      const artifact = currentTask.artifact;
      
      document.getElementById('artifactDisplay')?.classList.remove('zoom-1', 'zoom-2', 'zoom-3');
      document.getElementById('artifactDisplay')?.classList.add('zoom-' + zoomLevel);

      if (stepId === 'observe') {
        renderObserveArea(area);
      } else if (stepId === 'clean') {
        renderCleanArea(area);
      } else if (stepId === 'assemble') {
        renderAssembleArea(area);
      } else if (stepId === 'fill') {
        renderFillArea(area);
      } else if (stepId === 'color') {
        renderColorArea(area);
      } else if (stepId === 'protect') {
        renderProtectArea(area);
      }
    }

    function renderObserveArea(area) {
      const useMicroscope = selectedTool === 'microscope';
      const useXray = selectedTool === 'xray';
      
      if (damageSpots.length === 0) {
        damageSpots = generateDamageSpots(useXray ? 7 : 5, useMicroscope);
      }
      
      let spotsHtml = damageSpots.map((spot, i) => {
        const isVisible = !spot.hidden || useXray;
        const size = useMicroscope ? 18 : 12;
        return `
        <div class="damage-spot ${spot.found ? 'cleaned' : ''}" 
             style="left: ${spot.x}%; top: ${spot.y}%; 
                    width: ${size}px; height: ${size}px;
                    ${spot.hidden && !useXray ? 'opacity: 0.3; filter: blur(2px);' : ''}
                    ${spot.microDetail && !useMicroscope ? 'display: none;' : ''}"
             onclick="findDamage(${i})"
             title="${!isVisible ? '需要X光设备' : spot.microDetail ? '显微镜下可见' : '点击观察'}">
        </div>
      `}).join('');
      
      const detailPanel = useMicroscope ? `
        <div style="position: absolute; bottom: 10px; left: 10px; right: 10px; 
                    background: rgba(0,0,0,0.8); padding: 10px; border-radius: 6px; font-size: 11px;">

    function generateDamageSpots(count, hasMicroscope) {
      const spots = [];
      const microDetails = ['表面划痕', '氧化斑点', '细微裂纹', '腐蚀痕迹', '修复残留'];
      for (let i = 0; i < count; i++) {
        spots.push({
          x: 10 + Math.random() * 80,
          y: 10 + Math.random() * 80,
          found: false,
          cleaned: false,
          hidden: i >= 5,
          microDetail: hasMicroscope && i >= 3 && i < 5 ? microDetails[i - 3] : null
        });
      }
      return spots;
    }

    function findDamage(index) {
      const spot = damageSpots[index];
      
      if (spot.hidden && selectedTool !== 'xray') {
        showNotification('需要X光设备才能发现此隐藏损伤！', 'error');
        return;
      }
      
      if (spot.microDetail && selectedTool !== 'microscope' && !spot.found) {
        showNotification('微观细节需要显微镜才能观察！', 'error');
        return;
      }
      
      if (!spot.found) {
        spot.found = true;
        let msg = '发现破损点！';
        let logText = `发现破损点 #${index + 1}`;
        
        if (spot.hidden) {
          msg = '发现内部隐藏损伤！';
          logText += ' (X光透视发现)';
        }
        if (spot.microDetail) {
          msg = `发现微观细节：${spot.microDetail}！`;
          logText += ` - ${spot.microDetail} (显微镜发现)`;
          observeDetails.push(spot.microDetail);
        }
        
        showNotification(msg);
        addLog('观察', logText);
        renderWorkArea('observe');
      }
    }

    async function renderCleanArea(area) {
      const foundSpots = damageSpots.filter(s => s.found);
      const useLaser = selectedTool === 'laser';
      
      let spotsHtml = foundSpots.map((spot, i) => {
        const originalIndex = damageSpots.indexOf(spot);
        return `
        <div class="damage-spot ${spot.cleaned ? 'cleaned' : ''}" 
             style="left: ${spot.x}%; top: ${spot.y}%; 
                    background: ${spot.cleaned ? 'rgba(46,125,50,0.3)' : 'rgba(139,69,19,0.6)'};
                    ${useLaser ? 'box-shadow: 0 0 8px rgba(0,255,255,0.5);' : ''}"
             onclick="cleanDamage(${originalIndex})"
             title="${spot.cleaned ? '已清洁' : useLaser ? '激光清洁（高效）' : '点击清洁'}">
        </div>
      `}).join('');
      
      const laserPanel = useLaser ? `
        <div style="position: absolute; bottom: 10px; left: 10px; right: 10px; 
                    background: rgba(0,100,100,0.8); padding: 10px; border-radius: 6px; font-size: 11px;">
          <strong style="color: #00ffff;">💫 激光清洗模式</strong>
          <p style="margin: 5px 0 0; color: #a08060;">高效清洁：可同时处理多处污渍，耗材用量减半，损伤风险降低</p>
        </div>
      ` : '';
      
      area.innerHTML = `
        <div id="artifactDisplay" class="artifact-display zoom-${zoomLevel}">
          ${currentTask.artifact.image}
          <div class="damage-overlay">${spotsHtml}</div>
          ${laserPanel}
        </div>
      `;
      
      setTimeout(() => {
        if (foundSpots.filter(s => s.cleaned).length >= 3) {
          if (!stepsProgress['clean']) {
            stepsProgress['clean'] = true;
            addLog('清洁', `完成清洁，处理 ${foundSpots.filter(s => s.cleaned).length} 处污渍`);
            if (useLaser) {
              toolBonus.laserUsed = true;
              addLog('工具', '使用激光清洗机完成清洁，效率提升');
            }
            updateProgress();
            loadStep(currentStepIndex);
          }
        }
      }, 100);
    }

    async function cleanDamage(index) {
      if (!selectedTool) {
        showNotification('请先选择工具！', 'error');
        return;
      }
      
      if (damageSpots[index].cleaned) return;
      
      const forceEffect = calculateForceEffect();
      forceStats.totalActions++;
      
      if (forceEffect.tooLight) {
        forceStats.tooLightCount++;
        showNotification('力度太轻，污渍难以清除！请加大力度', 'error');
        addLog('清洁', `尝试清洁破损点 #${index + 1}，力度过轻，未完成`);
        return;
      }
      
      const useLaser = selectedTool === 'laser';
      const materialCost = useLaser ? 0.5 : 1;
      
      if (useLaser && Math.random() < 0.4) {
        const nearby = damageSpots.findIndex((s, i) => 
          i !== index && s.found && !s.cleaned && 
          Math.abs(s.x - damageSpots[index].x) < 20 && 
          Math.abs(s.y - damageSpots[index].y) < 20
        );
        if (nearby >= 0) {
          damageSpots[nearby].cleaned = true;
          addLog('清洁', `激光连带清洁破损点 #${nearby + 1}`);
        }
      }
      
      const consumeResult = await checkAndConsumeMaterial(materialCost);
      if (!consumeResult.success) return;
      
      const riskChance = useLaser ? 0.1 : 0.3;
      if (forceEffect.risk && Math.random() < riskChance && !currentEmergency) {
        triggerEmergency('clean');
        return;
      }
      
      if (forceEffect.perfect) {
        forceStats.perfectCount++;
      }
      if (forceEffect.tooHeavy) {
        forceStats.tooHeavyCount++;
      }
      
      damageSpots[index].cleaned = true;
      forceQualityModifier = Math.min(1.2, forceQualityModifier + forceEffect.qualityDelta * 0.05);
      
      let msg = '清洁完成';
      if (forceEffect.perfect) msg = '清洁完美！';
      if (useLaser) msg = '⚡ ' + msg;
      
      showNotification(msg);
      addLog('清洁', `清洁破损点 #${index + 1}，工具：${selectedTool === 'laser' ? '激光清洗机' : selectedTool}，力度：${toolForce}，效果：${forceEffect.qualityDelta > 0.5 ? '优秀' : forceEffect.qualityDelta > 0 ? '良好' : '一般'}`);
      
      renderWorkArea('clean');
      updateStatus();
    }

    function calculateForceEffect() {
      if (toolForce <= 2) {
        return { risk: false, qualityDelta: -0.5, slow: true, tooLight: true, perfect: false, tooHeavy: false };
      } else if (toolForce <= 4) {
        return { risk: false, qualityDelta: 0.3, slow: false, tooLight: false, perfect: false, tooHeavy: false };
      } else if (toolForce <= 6) {
        return { risk: false, qualityDelta: 1, slow: false, tooLight: false, perfect: true, tooHeavy: false };
      } else if (toolForce <= 8) {
        return { risk: true, qualityDelta: 0.5, slow: false, tooLight: false, perfect: false, tooHeavy: false };
      } else {
        return { risk: true, qualityDelta: -0.5, slow: false, tooLight: false, perfect: false, tooHeavy: true };
      }
    }

    function triggerEmergency(stepId) {
      const emergencies = EMERGENCY_TYPES[stepId];
      if (!emergencies || emergencies.length === 0) return;
      
      currentEmergency = emergencies[Math.floor(Math.random() * emergencies.length)];
      addLog('⚠️ 突发', currentEmergency.name + ' - ' + currentEmergency.desc);
      
      const panel = document.getElementById('emergencyPanel');
      const content = document.getElementById('emergencyContent');
      
      content.innerHTML = `
        <h3 style="color: #f44336; margin-bottom: 10px;">${currentEmergency.name}</h3>
        <p style="margin-bottom: 15px;">${currentEmergency.desc}</p>
        <div style="display: flex; gap: 10px; justify-content: center;">
          ${currentEmergency.options.map((opt, i) => `
            <button class="btn ${i === 0 ? 'btn-primary' : ''}" onclick="handleEmergencyOption(${i})">
              ${opt.text}
              ${opt.cost ? `<span style="font-size: 10px; margin-left: 5px;">(${getMaterialsInfo()[opt.cost.material]?.name} x${opt.cost.amount})</span>` : ''}
            </button>
          `).join('')}
        </div>
      `;
      
      panel.style.display = 'block';
      document.getElementById('nextStepBtn').style.display = 'none';
      document.getElementById('completeBtn').style.display = 'none';
      document.getElementById('prevStepBtn').style.display = 'none';
      
      showNotification('⚠️ ' + currentEmergency.name, 'error');
    }

    async function handleEmergencyOption(optionIndex) {
      const option = currentEmergency.options[optionIndex];
      
      if (option.cost) {
        if ((gameState.materials[option.cost.material] || 0) < option.cost.amount) {
          showNotification(`材料不足：${getMaterialsInfo()[option.cost.material]?.name}`, 'error');
          return;
        }
        await ipcRenderer.invoke('use-material', option.cost.material, option.cost.amount);
        gameState = await getGameState();
        usedMaterials[option.cost.material] = (usedMaterials[option.cost.material] || 0) + option.cost.amount;
        emergencyPenalty += 0.02;
        addLog('补救', `${option.text} - 成功`);
      } else {
        emergencyPenalty += 0.1;
        addLog('补救', `${option.text} - 质量下降`);
      }
      
      currentEmergency = null;
      document.getElementById('emergencyPanel').style.display = 'none';
      loadStep(currentStepIndex);
      updateStatus();
    }

    async function renderAssembleArea(area) {
      if (puzzlePieces.length === 0) {
        puzzlePieces = [
          { id: 0, name: '碎片A', placed: false, correctPos: 0 },
          { id: 1, name: '碎片B', placed: false, correctPos: 1 },
          { id: 2, name: '碎片C', placed: false, correctPos: 2 },
          { id: 3, name: '碎片D', placed: false, correctPos: 3 }
        ];
      }
      
      const unplaced = puzzlePieces.filter(p => !p.placed);
      const slots = [0, 1, 2, 3].map(i => {
        const placed = puzzlePieces.find(p => p.placed && p.currentPos === i);
        return placed ? `<div class="puzzle-piece placed">${placed.correctPos === i ? '✅' : '⚠️'} ${placed.name}</div>` : `<div class="empty-slot" onclick="placePiece(${i})">空位 ${i + 1}</div>`;
      }).join('');
      
      area.innerHTML = `
        <div style="width: 100%;">
          <div style="text-align: center; margin-bottom: 20px;">
            <h3 style="color: #d4af37; margin-bottom: 10px;">将碎片拖放到正确位置</h3>
            <p style="color: #a08060; font-size: 12px;">可用碎片：${unplaced.map(p => `<span class="tag tag-era" style="cursor: pointer; margin: 2px;" onclick="selectPiece(${p.id})">${p.name}</span>`).join('')}</p>
          </div>
          <div class="puzzle-area">
            ${slots}
          </div>
        </div>
      `;
      
      setTimeout(() => {
        if (puzzlePieces.every(p => p.placed)) {
          if (!stepsProgress['assemble']) {
            const correctCount = puzzlePieces.filter(p => p.correctPos === p.currentPos).length;
            stepsProgress['assemble'] = true;
            addLog('拼合', `完成拼接，正确定位 ${correctCount}/${puzzlePieces.length} 块碎片`);
            if (correctCount < puzzlePieces.length) {
              emergencyPenalty += 0.05 * (puzzlePieces.length - correctCount);
            }
            updateProgress();
            loadStep(currentStepIndex);
          }
        }
      }, 100);
    }

    let selectedPiece = null;
    async function selectPiece(id) {
      selectedPiece = id;
      const forceEffect = calculateForceEffect();
      
      if (forceEffect.tooLight) {
        showNotification('力度太轻，无法稳固拿起碎片！', 'error');
        return;
      }
      
      showNotification('已选择碎片，点击空位放置');
      
      if (forceEffect.risk && Math.random() < 0.2 && !currentEmergency) {
        const consumeResult = await checkAndConsumeMaterial();
        if (consumeResult.success) {
          triggerEmergency('assemble');
        }
      }
    }

    async function placePiece(pos) {
      if (selectedPiece === null) {
        showNotification('请先选择碎片！', 'error');
        return;
      }
      
      const forceEffect = calculateForceEffect();
      forceStats.totalActions++;
      
      if (forceEffect.tooLight) {
        forceStats.tooLightCount++;
        showNotification('力度太轻，碎片无法粘合！', 'error');
        addLog('拼合', `尝试放置碎片，力度过轻，粘合失败`);
        return;
      }
      
      if (forceEffect.perfect) {
        forceStats.perfectCount++;
      }
      if (forceEffect.tooHeavy) {
        forceStats.tooHeavyCount++;
      }
      
      const consumeResult = await checkAndConsumeMaterial();
      if (!consumeResult.success) return;
      
      const piece = puzzlePieces.find(p => p.id === selectedPiece);
      if (piece && !piece.placed) {
        piece.placed = true;
        piece.currentPos = pos;
        selectedPiece = null;
        
        forceQualityModifier = Math.min(1.2, forceQualityModifier + forceEffect.qualityDelta * 0.05);
        
        let msg = '碎片已放置！';
        if (forceEffect.perfect) msg = '碎片完美定位！';
        
        showNotification(msg);
        addLog('拼合', `放置 ${piece.name} 到位置 ${pos + 1}，力度：${toolForce}，定位：${piece.correctPos === pos ? '正确' : '偏差'}`);
        renderWorkArea('assemble');
      }
    }

    async function applyFill() {
      const amount = parseInt(document.getElementById('fillAmount').value);
      const forceEffect = calculateForceEffect();
      forceStats.totalActions++;
      
      if (forceEffect.tooLight) {
        forceStats.tooLightCount++;
        showNotification('力度太轻，填充不实，无法成型！', 'error');
        addLog('补配', `尝试填充，力度过轻，失败`);
        return;
      }
      
      const consumeResult = await checkAndConsumeMaterial(forceEffect.tooHeavy ? 1.5 : 1);

      if (forceEffect.perfect) {
        forceStats.perfectCount++;
      }
      if (forceEffect.tooHeavy) {
        forceStats.tooHeavyCount++;
      }
      
      if (amount >= 70 && amount <= 90) {
        stepsProgress['fill'] = true;
        forceQualityModifier = Math.min(1.2, forceQualityModifier + forceEffect.qualityDelta * 0.05);
        addLog('补配', `填充完成，填充量：${amount}%，力度：${toolForce}，效果：${forceEffect.perfect ? '完美' : '良好'}`);
        updateProgress();
        showNotification(forceEffect.perfect ? '填充完美！' : '填充完成！');
        loadStep(currentStepIndex);

      if (currentStepIndex > 0) {
        loadStep(currentStepIndex - 1);
      }

      });

      if (reports.length === 0) {
        showModal(`
          <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">📄 检测报告</h2>
          <p style="text-align: center; color: #a08060;">暂无检测报告</p>
          <p style="text-align: center; margin-top: 15px;">前往检测室进行年代、材质、X光检测</p>
          <div style="text-align: center; margin-top: 20px;">
            <button class="btn" onclick="closeModal()">关闭</button>
            <button class="btn btn-primary" onclick="goToLab()" style="margin-left: 10px;">前往检测室</button>
          </div>
        `);
      } else {
        showModal(`
          <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">📄 检测报告</h2>
          <div style="max-height: 400px; overflow-y: auto;">
            ${reports.map(r => `
              <div class="card" style="background: rgba(0,0,0,0.2); margin-bottom: 15px;">
                <h4 style="color: #d4af37; margin-bottom: 10px;">${r.type} - ${new Date(r.timestamp).toLocaleString()}</h4>
                <pre style="font-size: 12px; white-space: pre-wrap; font-family: inherit;">${r.content}</pre>
              </div>
            `).join('')}
          </div>
          <div style="text-align: center; margin-top: 20px;">
            <button class="btn" onclick="closeModal()">关闭</button>
          </div>
        `);
      }
    }

    function goToLab() {
      closeModal();
      ipcRenderer.invoke('open-lab');
    }

    async function completeRestoration() {
      const quality = calculateQuality();
      
      const toolUsedList = [];
      if (toolBonus.microscopeUsed) toolUsedList.push('🔬 显微镜');
      if (toolBonus.xrayUsed) toolUsedList.push('📷 X光透视');
      if (toolBonus.laserUsed) toolUsedList.push('💫 激光清洗机');
      if (toolBonus.uvUsed) toolUsedList.push('💡 UV固化灯');
      
      let forceGrade = '一般';
      if (forceStats.totalActions > 0) {
        const perfectRate = forceStats.perfectCount / forceStats.totalActions;
        if (perfectRate >= 0.7) forceGrade = '优秀';
        else if (perfectRate >= 0.4) forceGrade = '良好';
      }
      
      showModal(`
        <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">🎉 修复完成！</h2>
        <div style="text-align: center; margin-bottom: 20px;">
          <div style="font-size: 80px;">${currentTask.artifact.image}</div>
          <h3>${currentTask.artifact.name}</h3>
        </div>
        <div style="margin-bottom: 20px;">
          <p><strong>修复质量：</strong><span class="stars">${getQualityStars(quality)}</span> (${Math.round(quality * 100)}%)</p>
          <p><strong>获得奖励：</strong><span style="color: #d4af37;">💰 ${Math.floor(currentTask.baseReward * quality).toLocaleString()}</span></p>
          <p><strong>获得声望：</strong><span style="color: #d4af37;">⭐ ${Math.floor(currentTask.reputation * quality)}</span></p>
        </div>
        
        ${toolUsedList.length > 0 ? `
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(76,175,80,0.1); border-radius: 6px;">
          <p style="color: #4caf50; margin-bottom: 5px;"><strong>🛠️ 使用高级工具：</strong></p>
          <p style="font-size: 13px;">${toolUsedList.join('、')}</p>
        </div>
        ` : ''}
        
        ${forceStats.totalActions > 0 ? `
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(212,175,55,0.1); border-radius: 6px;">
          <p style="color: #d4af37; margin-bottom: 5px;"><strong>⚡ 力度控制评级：${forceGrade}</strong></p>
          <p style="font-size: 12px; color: #a08060;">
            完美 ${forceStats.perfectCount} 次 · 过轻 ${forceStats.tooLightCount} 次 · 过重 ${forceStats.tooHeavyCount} 次
          </p>
        </div>
        ` : ''}
        
        ${emergencyPenalty > 0 ? `
        <div style="margin-bottom: 15px; padding: 10px; background: rgba(244,67,54,0.1); border-radius: 6px;">
          <p style="color: #f44336; margin-bottom: 5px;"><strong>⚠️ 突发事件惩罚：</strong></p>
          <p style="font-size: 12px;">-${Math.round(emergencyPenalty * 100)}% 质量扣减</p>
        </div>
        ` : ''}
        
        <div style="margin-bottom: 20px;">
          <h4 style="color: #d4af37; margin-bottom: 10px;">📋 修复日志</h4>
          <div style="max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;">
            ${restorationLog.map(log => `
              <div style="font-size: 12px; margin-bottom: 5px; padding: 5px; border-bottom: 1px solid #333;">
                <span style="color: #888;">[${log.time}]</span>
                <span style="color: #d4af37;">[${log.step}]</span>
                <span style="color: ${log.category === '⚠️ 突发' ? '#f44336' : log.category === '评分' ? '#4caf50' : log.category === '工具' ? '#2196f3' : '#e8d5b7'};">${log.category}:</span>
                ${log.text}
              </div>
            `).join('')}
          </div>
        </div>
        <div style="text-align: center;">
          <button class="btn btn-primary" onclick="confirmComplete(${quality})">确认并领取奖励</button>
        </div>
      `);
    }

    function calculateQuality() {
      let score = 0.35;
      
      const foundCount = damageSpots.filter(s => s.found).length;
      const totalSpots = damageSpots.length;
      score += (foundCount / totalSpots) * 0.12;
      
      const microFound = damageSpots.filter(s => s.found && s.microDetail).length;
      if (microFound > 0) {
        score += 0.05;
        addLog('评分', `显微镜发现 ${microFound} 处微观细节，评分 +5%`);
      }
      
      if (toolBonus.microscopeUsed) {
        score += 0.03;
        addLog('评分', '使用显微镜观察，精度加成 +3%');
      }
      if (toolBonus.xrayUsed) {
        score += 0.03;
        addLog('评分', '使用X光透视，发现内部损伤 +3%');
      }
      
      const cleanedCount = damageSpots.filter(s => s.cleaned).length;
      const foundCleanable = damageSpots.filter(s => s.found).length;
      if (foundCleanable > 0) {
        score += (cleanedCount / foundCleanable) * 0.1;
      }
      
      if (toolBonus.laserUsed) {
        score += 0.04;
        addLog('评分', '使用激光清洗机，高效无损 +4%');
      }
      
      const correctPieces = puzzlePieces.filter(p => p.placed && p.correctPos === p.currentPos).length;
      if (puzzlePieces.length > 0) {
        score += (correctPieces / puzzlePieces.length) * 0.1;
      }
      
      const completedSteps = Object.keys(stepsProgress).length;
      score += (completedSteps / RESTORATION_STEPS.length) * 0.12;
      
      if (toolBonus.uvUsed) {
        score += 0.02;
        addLog('评分', '使用UV固化，封护质量 +2%');
      }
      
      if (forceStats.totalActions > 0) {
        const perfectRate = forceStats.perfectCount / forceStats.totalActions;
        const tooLightRate = forceStats.tooLightCount / forceStats.totalActions;
        const tooHeavyRate = forceStats.tooHeavyCount / forceStats.totalActions;
        
        score += perfectRate * 0.08;
        score -= tooLightRate * 0.05;
        score -= tooHeavyRate * 0.03;
        
        addLog('评分', `力度控制：完美 ${Math.round(perfectRate * 100)}%，过轻 ${Math.round(tooLightRate * 100)}%，过重 ${Math.round(tooHeavyRate * 100)}%`);
      }
      
      score += (forceQualityModifier - 1) * 0.05;
      
      score -= emergencyPenalty;
      if (emergencyPenalty > 0) {
        addLog('评分', `突发事件惩罚：-${Math.round(emergencyPenalty * 100)}%`);
      }
      
      return Math.min(1.1, Math.max(0.3, score));
    }

    async function confirmComplete(quality) {
      const result = await ipcRenderer.invoke('complete-task', currentTask, quality, restorationLog);
      closeModal();
      showNotification(`修复完成！获得 💰${result.reward.toLocaleString()} ⭐${result.reputation}`);
      
      setTimeout(() => {
        ipcRenderer.invoke('refresh-all-windows');
        location.reload();
      }, 1500);
    }

    function cancelTask() {
      if (confirm('确定要放弃当前任务吗？已消耗的材料无法退还。')) {
        currentTask = null;
        ipcRenderer.invoke('set-current-task', null);
        location.reload();
      }
    }

    function showNotification(message, type = 'success') {
      const container = document.getElementById('notificationContainer');
      const notif = document.createElement('div');
      notif.className = 'notification' + (type === 'error' ? ' error' : '');
      notif.textContent = message;
      container.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    function showModal(content) {
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.id = 'currentModal';
      modal.innerHTML = `<div class="modal-content">${content}</div>`;
      modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
      document.body.appendChild(modal);
    }

    function closeModal() {
      document.getElementById('currentModal')?.remove();
    }

    init();
    setInterval(async () => {
      gameState = await getGameState();
      updateStatus();
    }, 2000);
  </script>
</body>
</html>
