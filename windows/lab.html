<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>检测室</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="header">
    <h1>🔬 检测室</h1>
    <div class="status-bar">
      <div class="status-item">
        <span class="status-icon">💰</span>
        <span class="status-value" id="budget">50,000</span>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div id="currentTaskBanner" class="card" style="display: none; background: rgba(212, 175, 55, 0.1); border-color: #d4af37;">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <strong style="color: #d4af37;">📋 当前任务：</strong>
          <span id="currentTaskName">无</span>
        </div>
        <div style="font-size: 12px; color: #a08060;">
          检测结果将自动关联到此任务
        </div>
      </div>
    </div>

    <div class="grid-2" style="margin-top: 20px;">
      <div class="card">
        <div class="card-title">🏺 选择检测文物</div>
        <div id="artifactList" style="max-height: 500px; overflow-y: auto;"></div>
      </div>

      <div class="card">
        <div class="card-title">🔬 检测设备</div>
        <div class="lab-equipment">
          <div class="equipment" onclick="runTest('dating')">
            <div class="equipment-icon">📅</div>
            <div class="equipment-name">年代检测</div>
          </div>
          <div class="equipment" onclick="runTest('material')">
            <div class="equipment-icon">🔍</div>
            <div class="equipment-name">材质分析</div>
          </div>
          <div class="equipment" onclick="runTest('xray')">
            <div class="equipment-icon">📷</div>
            <div class="equipment-name">X光扫描</div>
          </div>
        </div>

        <div id="selectedArtifact" style="margin-top: 20px;">
          <p style="color: #a08060; text-align: center;">请选择要检测的文物</p>
        </div>

        <div id="testResult" style="margin-top: 20px; display: none;">
          <div class="card" style="background: rgba(0,0,0,0.3);">
            <div class="card-title">📊 检测报告</div>
            <div id="resultContent"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top: 20px;">
      <div class="card-title">📋 检测历史</div>
      <div id="testHistory"></div>
    </div>
  </div>

  <div id="notificationContainer"></div>

  <script src="../data/game-data.js"></script>
  <script>
    const { ipcRenderer } = require('electron');
    let gameState = null;
    let selectedArtifact = null;
    let testHistory = [];

    async function init() {
      gameState = await getGameState();
      updateStatus();
      updateCurrentTaskBanner();
      renderArtifactList();
      renderTestHistory();
    }

    function updateCurrentTaskBanner() {
      const banner = document.getElementById('currentTaskBanner');
      const nameEl = document.getElementById('currentTaskName');
      if (gameState.currentTask) {
        banner.style.display = 'block';
        nameEl.textContent = gameState.currentTask.title + ' - ' + gameState.currentTask.artifact.name;
      } else {
        banner.style.display = 'none';
      }
    }

    function updateStatus() {
      document.getElementById('budget').textContent = gameState.budget.toLocaleString();
    }

    function renderArtifactList() {
      const container = document.getElementById('artifactList');
      const artifacts = getArtifacts();
      
      container.innerHTML = artifacts.map((art, i) => `
        <div class="list-item ${selectedArtifact?.id === art.id ? 'selected' : ''}" 
             style="cursor: pointer; ${selectedArtifact?.id === art.id ? 'border-left: 3px solid #d4af37;' : ''}"
             onclick="selectArtifact(${i})">
          <div style="display: flex; align-items: center; gap: 15px;">
            <span style="font-size: 32px;">${art.image}</span>
            <div>
              <div style="color: #d4af37;">${art.name}</div>
              <div style="font-size: 12px; color: #a08060;">
                <span class="tag tag-era">${art.era}</span>
                <span class="tag tag-era">${art.material}</span>
              </div>
            </div>
          </div>
          <span>▶</span>
        </div>
      `).join('');
    }

    function selectArtifact(index) {
      const artifacts = getArtifacts();
      selectedArtifact = artifacts[index];
      renderArtifactList();
      
      const infoEl = document.getElementById('selectedArtifact');
      infoEl.innerHTML = `
        <div style="text-align: center; padding: 20px; background: rgba(0,0,0,0.2); border-radius: 10px;">
          <div style="font-size: 80px; margin-bottom: 15px;">${selectedArtifact.image}</div>
          <h3 style="color: #d4af37; margin-bottom: 10px;">${selectedArtifact.name}</h3>
          <p style="color: #a08060; font-size: 13px; margin-bottom: 15px;">${selectedArtifact.description}</p>
          <div style="margin-bottom: 10px;">
            <span class="tag tag-era">${selectedArtifact.era}</span>
            <span class="tag tag-era">${selectedArtifact.material}</span>
            <span class="tag tag-difficulty">稀有度 ${'★'.repeat(selectedArtifact.rarity)}</span>
          </div>
          <p style="color: #a08060; font-size: 12px;">
            <strong>已知破损：</strong>${selectedArtifact.damage.join('、')}
          </p>
        </div>
      `;
    }

    async function runTest(type) {
      if (!selectedArtifact) {
        showNotification('请先选择文物！', 'error');
        return;
      }

      const testInfo = {
        dating: { name: '年代检测', cost: 500, icon: '📅' },
        material: { name: '材质分析', cost: 800, icon: '🔍' },
        xray: { name: 'X光扫描', cost: 1500, icon: '📷' }
      };

      const info = testInfo[type];
      
      if (gameState.budget < info.cost) {
        showNotification('余额不足！', 'error');
        return;
      }

      gameState.budget -= info.cost;
      await ipcRenderer.invoke('update-budget', -info.cost);
      updateStatus();

      showNotification(`${info.name}进行中...`);

      setTimeout(async () => {
        const report = generateTestReport(type);
        displayTestResult(report);
        addToHistory(type, info);
        
        if (gameState.currentTask) {
          await ipcRenderer.invoke('add-lab-report', gameState.currentTask.id, report);
          showNotification(`${info.name}完成！报告已关联到当前任务`);
        } else {
          showNotification(`${info.name}完成！`);
        }
      }, 2000);
    }

    function generateTestReport(type) {
      const art = selectedArtifact;
      const mat = art.material;
      let content = '';
      let typeName = '';

      switch (type) {
        case 'dating':
          typeName = '年代检测报告';
          content = generateDatingReport(art);
          break;
        case 'material':
          typeName = '材质分析报告';
          content = generateMaterialReport(art, mat);
          break;
        case 'xray':
          typeName = 'X光扫描报告';
          content = generateXrayReport(art, mat);
          break;
      }

      return { type: typeName, content, artifactId: art.id };
    }

    function generateDatingReport(art) {
      const mat = art.material;
      let methodNote = '';
      
      if (['青铜', '铜', '铁器'].includes(mat)) {
        methodNote = '金属器采用金相分析 + 铭文断代法';
      } else if (['瓷器', '陶器'].includes(mat)) {
        methodNote = '陶瓷器采用热释光测年法 + 胎釉比对';
      } else if (['绢本设色', '纸本', '帛画'].includes(mat)) {
        methodNote = '书画采用碳14测年法 + 印章/落款比对';
      } else if (['和田玉', '玉石'].includes(mat)) {
        methodNote = '玉器采用器型学 + 工艺痕迹分析';
      } else if (['漆器'].includes(mat)) {
        methodNote = '漆器采用漆膜碳14测年 + 木胎年轮分析';
      } else {
        methodNote = '综合采用碳14测年法 / 地层学分析';
      }
      
      return `检测物品：${art.name}
文物编号：${art.id.toUpperCase()}
推定年代：${art.era}
距今时间：${getEraYears(art.era)}
检测方法：${methodNote}
可信度：${90 + Math.floor(Math.random() * 10)}%

年代佐证：
• 器型风格符合${art.era}典型特征
• 工艺痕迹与同期器物一致
• ${mat}材质老化程度与年代匹配

⚠️ 年代相关病害风险：
${getAgeRelatedDisease(art)}`;
    }

    function generateMaterialReport(art, mat) {
      const diseaseInfo = getMaterialDiseaseProfile(mat);
      
      return `检测物品：${art.name}
主要材质：${mat}
成分分析：${getMaterialComposition(mat)}
硬度：${getMaterialHardness(mat)}
密度：${getMaterialDensity(mat)}

材质特性分析：
${diseaseInfo.characteristics}

⚠️ 主要病害风险：
${diseaseInfo.risks.map(r => '• ' + r).join('\n')}

🔧 修复建议：
${diseaseInfo.suggestions.map(s => '• ' + s).join('\n')}

📋 保存状态评估：
当前状态：${getCondition(art)}
建议修复优先级：${diseaseInfo.priority}`;
    }

    function generateXrayReport(art, mat) {
      const xrayInfo = getXrayAnalysis(mat, art);
      
      return `检测物品：${art.name}
扫描设备：工业CT + 数字化X光机
扫描分辨率：0.1mm
穿透深度：${getPenetrationDepth(mat)}

📷 内部结构分析：
${xrayInfo.structure}

🔍 发现的内部病害：
${xrayInfo.damages.map(d => '• ' + d).join('\n')}

⚙️ 铸造/制作工艺痕迹：
${xrayInfo.craftTraces}

⚠️ 内部风险评估：
风险等级：${xrayInfo.riskLevel}
需重点关注：${xrayInfo.focusPoints}

🔧 针对性修复建议：
${xrayInfo.recommendations.map(r => '• ' + r).join('\n')}`;
    }

      const profiles = {

          risks: [

        '纸本': {

        },
        '和田玉': {
          characteristics: '玉石硬度高但脆性大，受撞击易产生绺裂，绺裂内含铁氧化物会形成沁色，酸性环境会腐蚀表面。',
          risks: [

          priority: '低 - 玉石稳定性较好'

        '铜': {
          characteristics: '纯铜耐腐蚀性比青铜差，易生成铜绿（碱式碳酸铜），在含氯环境中会产生有害锈。',

            '铜绿层增厚 - 覆盖纹饰',
            '有害锈（粉状锈）- 含氯环境诱发',
            '基体腐蚀坑洞 - 深层腐蚀',
            '焊接点腐蚀 - 不同金属接触腐蚀',
            '表面变色 - 氧化层不均'
          ],
          suggestions: [
            '除锈采用机械法结合化学法',
            '有害锈区域做局部封护',

      return profiles[material] || {

          structure: '多层结构：画芯层-托纸层-覆背纸。纤维排列方向一致，厚度均匀。部分区域可见纤维交叉。',
          damages: [
            '画芯层发现3处纤维断裂，长度2-5mm',
            '托纸层有2处剥离起翘',
            '颜料层下可见纤维损伤痕迹',
            '折痕处纤维有疲劳断裂迹象'
          ],
          craftTraces: '手工织造经纬线清晰，托裱采用传统浆糊。绘制层颜料颗粒分布均匀。',
          riskLevel: '中等',
          focusPoints: '纤维断裂处是否继续扩大、托纸剥离是否影响画芯',
          recommendations: [
            '断裂处建议做隐补加固',
            '托纸剥离处需重新刷平粘牢',
            '折痕处避免继续折叠',
            '建议全色后再做覆背'
          ]
        },
        '陶器': {
          structure: '胎质孔隙率较高，颗粒大小不均。手制成型痕迹明显。器壁厚度差异较大。',
          damages: [
            '胎体内发现多处裂隙，部分已贯穿',
            '彩绘层下可见胎体表面剥落',
            '内部有可溶盐结晶的高密度影像',
            '旧修复的粘合剂已出现老化裂隙'
          ],
          craftTraces: '泥条盘筑成型痕迹清晰，表面打磨不平整。烧制温度偏低，胎质较松。',
          riskLevel: '中高',
          focusPoints: '可溶盐含量、贯穿裂隙对结构的影响',
          recommendations: [
            '必须先做脱盐处理',
            '贯穿裂隙需做加固粘接',
            '旧修复材料建议更换',
            '彩绘层需做加固处理'
          ]
        }
      };
      
      return analyses[material] || {
        structure: '内部结构基本完整，未见明显异常。',
        damages: ['未发现严重内部损伤', '结构完整性良好'],
        craftTraces: '制作工艺符合时代特征。',
        riskLevel: '低',
        focusPoints: '常规检查即可',
        recommendations: ['按常规修复流程进行', '注意保存环境控制']
      };
    }

    function getPenetrationDepth(material) {
      const depths = {
        '青铜': '约20mm',
        '瓷器': '约30mm',
        '陶器': '约25mm',
        '和田玉': '约15mm',
        '绢本设色': '约5mm（低功率）',
        '纸本': '约3mm（低功率）',
        '漆器': '约10mm',
        '铜': '约18mm'
      };
      return depths[material] || '约15mm';
    }

    function getAgeRelatedDisease(art) {
      const era = art.era;
      const mat = art.material;
      const diseases = [];
      
      if (['商代', '战国', '秦代', '汉代'].includes(era)) {
        if (['青铜', '铜'].includes(mat)) {
          diseases.push('• 高古青铜器需重点检测有害锈，埋藏环境氯离子含量高');
        }
        diseases.push('• 年代久远，材质自然老化程度较高');
      }
      
      if (['唐代', '宋代'].includes(era)) {
        if (mat === '瓷器') {
          diseases.push('• 唐宋瓷器釉面老化明显，需注意胎釉结合部');
        }
      }
      
      if (['明代', '清代'].includes(era)) {
        if (['绢本设色', '纸本'].includes(mat)) {
          diseases.push('• 明清书画常见酸化和纤维老化问题');
        }
      }
      
      if (diseases.length === 0) {
        diseases.push('• 需结合材质进一步评估年代相关病害');
      }
      
      return diseases.join('\n');
    }

    function getMaterialDensity(material) {
      const densities = {
        '青铜': '约8.8 g/cm³',
        '瓷器': '约2.4 g/cm³',
        '和田玉': '约2.95 g/cm³',
        '绢本设色': '约1.3 g/cm³',
        '陶器': '约2.0 g/cm³',
        '漆器': '约1.2 g/cm³',
        '铜': '约8.9 g/cm³'
      };
      return densities[material] || '待检测';
    }

    function displayTestResult(report) {
      const resultEl = document.getElementById('testResult');
      const contentEl = document.getElementById('resultContent');
      resultEl.style.display = 'block';

      contentEl.innerHTML = `
        <h4 style="color: #d4af37; margin-bottom: 10px;">� ${report.type}</h4>
        <div style="position: relative; padding: 20px; background: #1a0f0a; border-radius: 8px; overflow: hidden;">
          <div class="scan-line"></div>
          <pre style="white-space: pre-wrap; font-family: inherit; font-size: 13px;">${report.content}</pre>
        </div>
        ${gameState.currentTask ? 
          `<p style="margin-top: 10px; color: #4caf50; font-size: 12px; text-align: center;">✅ 已自动关联到当前任务：${gameState.currentTask.title}</p>` 
          : 
          `<p style="margin-top: 10px; color: #ff9800; font-size: 12px; text-align: center;">⚠️ 无进行中的任务，报告未关联</p>`
        }
      `;
    }

    function getEraYears(era) {
      const map = {
        '商代': '约3600年前',
        '战国': '约2400年前',
        '秦代': '约2200年前',
        '汉代': '约2000年前',
        '唐代': '约1400年前',
        '宋代': '约1000年前',
        '元代': '约700年前',
        '明代': '约600年前',
        '清代': '约200年前',
        '白垩纪': '约6500万年前'
      };
      return map[era] || '未知';
    }

    function getMaterialComposition(material) {
      const map = {
        '青铜': '铜80% + 锡15% + 铅5%',
        '瓷器': '高岭土 + 石英 + 长石',
        '和田玉': '透闪石 + 阳起石',
        '绢本设色': '蚕丝 + 矿物颜料',
        '陶器': '黏土 + 石英砂',
        '漆器': '天然漆 + 木胎',
        '铜': '纯铜95% + 杂质5%',
        '化石': '磷酸钙 + 矿物质沉积'
      };
      return map[material] || '待分析';
    }

    function getMaterialHardness(material) {
      const map = {
        '青铜': '摩氏硬度 3.5',
        '瓷器': '摩氏硬度 6.5',
        '和田玉': '摩氏硬度 6-6.5',
        '绢本设色': '摩氏硬度 <1 (有机材质)',
        '陶器': '摩氏硬度 4-5',
        '漆器': '摩氏硬度 2-3',
        '铜': '摩氏硬度 3',
        '化石': '摩氏硬度 5'
      };
      return map[material] || '未知';
    }

    function getCondition(art) {
      const conditions = ['一般', '较差', '已出现风化迹象', '需紧急处理'];
      return conditions[Math.floor(Math.random() * conditions.length)];
    }

    function getInternalStructure(art) {
      const structures = [
        '实心结构，无明显中空',
        '存在内部空腔，可能为铸造痕迹',
        '多层结构，显示多次加工痕迹',
        '内部有金属支撑物'
      ];
      return structures[Math.floor(Math.random() * structures.length)];
    }

    function getHiddenDamage(art) {
      const damages = [
        '发现2处内部裂纹，表面不可见',
        '内部结构完整，无隐藏损伤',
        '发现早期修复的填充物',
        '存在微小气孔，可能影响强度'
      ];
      return damages[Math.floor(Math.random() * damages.length)];
    }

    function getRepairTraces(art) {
      const traces = [
        '无明显古代修复痕迹',
        '发现清代修补痕迹',
        '有近代修复使用的粘合剂残留',
        '存在多处不同时期的修复痕迹'
      ];
      return traces[Math.floor(Math.random() * traces.length)];
    }

    function getRecommendation(art) {
      const recs = [
        '建议先进行加固处理，再进行表面修复',
        '可直接进行常规修复操作',
        '建议使用激光清洗，避免机械损伤',
        '需在恒温恒湿环境下操作'
      ];
      return recs[Math.floor(Math.random() * recs.length)];
    }

    function addToHistory(type, info) {
      testHistory.unshift({
        artifact: selectedArtifact.name,
        testType: info.name,
        icon: info.icon,
        time: new Date().toLocaleString(),
        cost: info.cost
      });
      renderTestHistory();
    }

    function renderTestHistory() {
      const container = document.getElementById('testHistory');
      if (testHistory.length === 0) {
        container.innerHTML = '<p style="color: #a08060; text-align: center;">暂无检测记录</p>';
        return;
      }
      container.innerHTML = testHistory.map(item => `
        <div class="list-item">
          <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">${item.icon}</span>
            <div>
              <div>${item.artifact} - ${item.testType}</div>
              <div style="font-size: 11px; color: #a08060;">${item.time}</div>
            </div>
          </div>
          <span style="color: #d4af37;">💰 ${item.cost}</span>
        </div>
      `).join('');
    }

    function showNotification(message, type = 'success') {
      const container = document.getElementById('notificationContainer');
      const notif = document.createElement('div');
      notif.className = 'notification' + (type === 'error' ? ' error' : '');
      notif.textContent = message;
      container.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    init();
    setInterval(async () => {
      gameState = await getGameState();
      updateStatus();
    }, 2000);
  </script>
</body>
</html>
