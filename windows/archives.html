<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>任务档案</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="header">
    <h1>📋 任务档案</h1>
    <div class="status-bar">
      <div class="status-item">
        <span class="status-icon">💰</span>
        <span class="status-value" id="budget">50,000</span>
      </div>
      <div class="status-item">
        <span class="status-icon">⭐</span>
        <span class="status-value" id="reputation">0</span>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('available')">📝 可接委托</button>
      <button class="tab" onclick="switchTab('current')">🔧 当前任务</button>
      <button class="tab" onclick="switchTab('completed')">✅ 已完成</button>
    </div>

    <div id="availableTab">
      <div class="card">
        <div class="card-title">📝 待接委托</div>
        <p style="margin-bottom: 15px; color: #a08060;">选择感兴趣的修复任务接受委托</p>
        <div id="availableTasks"></div>
      </div>
    </div>

    <div id="currentTab" style="display: none;">
      <div class="card">
        <div class="card-title">🔧 当前任务</div>
        <div id="currentTask"></div>
      </div>
    </div>

    <div id="completedTab" style="display: none;">
      <div class="card">
        <div class="card-title">✅ 修复记录</div>
        <div id="filterBar" style="margin-bottom: 15px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 6px;">
          <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
            <span style="font-size: 12px; color: #a08060;">筛选：</span>
            <select id="filterEra" style="padding: 4px 8px; background: #2a2a2a; color: #e8d5b7; border: 1px solid #444; border-radius: 4px; font-size: 12px;" onchange="applyFilters()">
              <option value="">全部年代</option>
            </select>
            <select id="filterMaterial" style="padding: 4px 8px; background: #2a2a2a; color: #e8d5b7; border: 1px solid #444; border-radius: 4px; font-size: 12px;" onchange="applyFilters()">
              <option value="">全部材质</option>
            </select>
            <select id="filterQuality" style="padding: 4px 8px; background: #2a2a2a; color: #e8d5b7; border: 1px solid #444; border-radius: 4px; font-size: 12px;" onchange="applyFilters()">
              <option value="">全部质量</option>
              <option value="5">★★★★★ 极品</option>
              <option value="4">★★★★ 优秀</option>
              <option value="3">★★★ 良好</option>
              <option value="2">★★ 一般</option>
              <option value="1">★ 较差</option>
            </select>
            <select id="filterTool" style="padding: 4px 8px; background: #2a2a2a; color: #e8d5b7; border: 1px solid #444; border-radius: 4px; font-size: 12px;" onchange="applyFilters()">
              <option value="">全部工具</option>
              <option value="microscope">使用显微镜</option>
              <option value="laser">使用激光清洗</option>
              <option value="xray">使用X光</option>
              <option value="uv">使用UV固化</option>
              <option value="none">仅基础工具</option>
            </select>
            <button class="btn" style="padding: 3px 10px; font-size: 11px;" onclick="resetFilters()">重置</button>
          </div>
        </div>
        <div id="completedTasks"></div>
      </div>
    </div>
  </div>

  <div id="notificationContainer"></div>

  <script src="../data/game-data.js"></script>
  <script>
    const { ipcRenderer } = require('electron');
    let gameState = null;
    let acceptedTasks = [];
    let currentFilters = {
      era: '',
      material: '',
      quality: '',
      tool: ''
    };

    async function init() {
      gameState = await getGameState();
      updateStatus();
      initFilterOptions();
      renderAvailableTasks();
      renderCurrentTask();
      renderCompletedTasks();
      
      const pendingHighlight = await ipcRenderer.invoke('get-pending-highlight');
      if (pendingHighlight) {
        highlightAndOpenArtifact(pendingHighlight);
      }
      
      ipcRenderer.on('highlight-artifact', (_, artifactId) => {
        highlightAndOpenArtifact(artifactId);
      });
    }

    function highlightAndOpenArtifact(artifactId) {
      const idx = gameState.completedTasks.findIndex(t => t.artifact.id === artifactId);
      if (idx >= 0) {
        switchTab('completed');
        currentFilters = { era: '', material: '', quality: '', tool: '' };
        document.getElementById('filterEra').value = '';
        document.getElementById('filterMaterial').value = '';
        document.getElementById('filterQuality').value = '';
        document.getElementById('filterTool').value = '';
        renderCompletedTasks();
        
        setTimeout(() => {
          viewDetailedReview(idx);
        }, 300);
      }
    }

    function initFilterOptions() {
      const eras = [...new Set(gameState.completedTasks.map(t => t.artifact.era))];
      const materials = [...new Set(gameState.completedTasks.map(t => t.artifact.material))];
      
      const eraSelect = document.getElementById('filterEra');
      const matSelect = document.getElementById('filterMaterial');
      
      eras.forEach(era => {
        eraSelect.innerHTML += `<option value="${era}">${era}</option>`;
      });
      materials.forEach(mat => {
        matSelect.innerHTML += `<option value="${mat}">${mat}</option>`;
      });
    }

    function applyFilters() {
      currentFilters.era = document.getElementById('filterEra').value;
      currentFilters.material = document.getElementById('filterMaterial').value;
      currentFilters.quality = document.getElementById('filterQuality').value;
      currentFilters.tool = document.getElementById('filterTool').value;
      renderCompletedTasks();
    }

    function resetFilters() {
      document.getElementById('filterEra').value = '';
      document.getElementById('filterMaterial').value = '';
      document.getElementById('filterQuality').value = '';
      document.getElementById('filterTool').value = '';
      currentFilters = { era: '', material: '', quality: '', tool: '' };
      renderCompletedTasks();
    }

    function filterTasks(tasks) {
      return tasks.filter(task => {
        if (currentFilters.era && task.artifact.era !== currentFilters.era) return false;
        if (currentFilters.material && task.artifact.material !== currentFilters.material) return false;
        
        if (currentFilters.quality) {
          const q = parseInt(currentFilters.quality);
          if (q === 5 && task.quality < 0.9) return false;
          if (q === 4 && (task.quality < 0.75 || task.quality >= 0.9)) return false;
          if (q === 3 && (task.quality < 0.6 || task.quality >= 0.75)) return false;
          if (q === 2 && (task.quality < 0.4 || task.quality >= 0.6)) return false;
          if (q === 1 && task.quality >= 0.4) return false;
        }
        
        if (currentFilters.tool) {
          const tb = task.toolBonus || {};
          if (currentFilters.tool === 'microscope' && !tb.microscopeUsed) return false;
          if (currentFilters.tool === 'laser' && !tb.laserUsed) return false;
          if (currentFilters.tool === 'xray' && !tb.xrayUsed) return false;
          if (currentFilters.tool === 'uv' && !tb.uvUsed) return false;
          if (currentFilters.tool === 'none' && (tb.microscopeUsed || tb.laserUsed || tb.xrayUsed || tb.uvUsed)) return false;
        }
        
        return true;
      });
    }

    function updateStatus() {
      document.getElementById('budget').textContent = gameState.budget.toLocaleString();
      document.getElementById('reputation').textContent = gameState.reputation;
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      ['available', 'current', 'completed'].forEach(t => {
        document.getElementById(t + 'Tab').style.display = t === tabName ? 'block' : 'none';
      });
    }

    function renderAvailableTasks() {
      const container = document.getElementById('availableTasks');
      const allTasks = getTasks();
      const completedIds = gameState.completedTasks.map(t => t.id);
      
      const available = allTasks.filter(t => !completedIds.includes(t.id) && t.id !== gameState.currentTask?.id);
      
      if (available.length === 0) {
        container.innerHTML = '<p style="color: #a08060; text-align: center;">暂无可接委托</p>';
        return;
      }

      container.innerHTML = available.map(task => `
        <div class="list-item" style="padding: 15px;">
          <div style="display: flex; gap: 15px; flex: 1;">
            <span style="font-size: 48px;">${task.artifact.image}</span>
            <div style="flex: 1;">
              <h4 style="color: #d4af37; margin-bottom: 5px;">${task.title}</h4>
              <p style="font-size: 12px; color: #a08060; margin-bottom: 8px;">委托人：${task.client}</p>
              <p style="font-size: 13px; margin-bottom: 8px;">${task.description}</p>
              <div style="margin-bottom: 5px;">
                <span class="tag tag-era">${task.artifact.era}</span>
                <span class="tag tag-difficulty">难度 ${'★'.repeat(task.difficulty)}</span>
                <span class="tag tag-damage">期限 ${task.deadline}天</span>
              </div>
              <div>
                <strong>破损：</strong>
                ${task.artifact.damage.map(d => `<span class="tag tag-damage">${d}</span>`).join('')}
              </div>
            </div>
          </div>
          <div style="text-align: right;">
            <p style="color: #d4af37; font-size: 18px; margin-bottom: 5px;">💰 ${task.baseReward.toLocaleString()}</p>
            <p style="color: #4caf50; font-size: 12px; margin-bottom: 10px;">声望 +${task.reputation}</p>
            <button class="btn btn-primary" onclick="acceptTask('${task.id}')">接受委托</button>
          </div>
        </div>
      `).join('');
    }

    async function acceptTask(taskId) {
      if (gameState.currentTask) {
        showNotification('请先完成当前任务！', 'error');
        return;
      }
      
      const task = getTasks().find(t => t.id === taskId);
      if (task) {
        await ipcRenderer.invoke('set-current-task', task);
        gameState.currentTask = task;
        renderAvailableTasks();
        renderCurrentTask();
        showNotification('已接受委托：' + task.title);
      }
    }

    async function renderCurrentTask() {
      const container = document.getElementById('currentTask');
      
      if (!gameState.currentTask) {
        container.innerHTML = '<p style="color: #a08060; text-align: center;">暂无进行中的任务</p>';
        return;
      }

      const task = gameState.currentTask;
      const reports = await ipcRenderer.invoke('get-lab-reports', task.id);
      window.currentTaskReports = reports;
      
      container.innerHTML = `
        <div style="display: flex; gap: 20px;">
          <div style="text-align: center;">
            <div style="font-size: 100px; margin-bottom: 15px;">${task.artifact.image}</div>
          </div>
          <div style="flex: 1;">
            <h3 style="color: #d4af37; margin-bottom: 10px;">${task.title}</h3>
            <p style="margin-bottom: 10px;"><strong>委托人：</strong>${task.client}</p>
            <p style="margin-bottom: 10px;"><strong>期限：</strong>${task.deadline}天</p>
            <p style="margin-bottom: 15px;">${task.description}</p>
            
            <div class="card" style="background: rgba(0,0,0,0.2); margin-bottom: 15px;">
              <h4 style="color: #d4af37; margin-bottom: 10px;">📜 破损报告</h4>
              <p style="margin-bottom: 5px;"><strong>文物名称：</strong>${task.artifact.name}</p>
              <p style="margin-bottom: 5px;"><strong>年代：</strong>${task.artifact.era}</p>
              <p style="margin-bottom: 5px;"><strong>材质：</strong>${task.artifact.material}</p>
              <p style="margin-bottom: 5px;"><strong>破损情况：</strong></p>
              <ul style="margin-left: 20px; color: #ff8a80;">
                ${task.artifact.damage.map(d => `<li>${d}</li>`).join('')}
              </ul>
            </div>

            ${reports.length > 0 ? `
            <div class="card" style="background: rgba(0,0,0,0.2); margin-bottom: 15px;">
              <h4 style="color: #d4af37; margin-bottom: 10px;">📄 检测报告 (${reports.length})</h4>
              ${reports.map((r, i) => `
                <button class="btn" style="margin: 3px; padding: 3px 10px; font-size: 11px;" onclick="viewCurrentReport(${i})">${r.type}</button>
              `).join('')}
            </div>
            ` : ''}

            <div class="card" style="background: rgba(0,0,0,0.2); margin-bottom: 15px;">
              <h4 style="color: #d4af37; margin-bottom: 10px;">✅ 修复要求</h4>
              <ul style="margin-left: 20px;">
                ${task.requirements.map(r => `<li>${r}</li>`).join('')}
              </ul>
            </div>

            <div style="display: flex; gap: 10px;">
              <button class="btn btn-primary" onclick="goToRestoration()">前往修复台 →</button>
              <button class="btn" onclick="goToLab()">前往检测室</button>
              <button class="btn btn-danger" onclick="abandonTask()">放弃委托</button>
            </div>
          </div>
        </div>
      `;
    }

    function goToRestoration() {
      ipcRenderer.invoke('open-restoration');
    }

    function goToLab() {
      ipcRenderer.invoke('open-lab');
    }

    async function viewCurrentReport(idx) {
      const reports = window.currentTaskReports || [];
      const report = reports[idx];
      if (!report) return;
      
      showModal(`
        <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">📄 ${report.type}</h2>
        <div class="card" style="background: rgba(0,0,0,0.2);">
          <pre style="font-size: 13px; white-space: pre-wrap; font-family: inherit;">${report.content}</pre>
        </div>
        <div style="text-align: center; margin-top: 20px;">
          <button class="btn" onclick="closeModal()">关闭</button>
        </div>
      `);
    }

    async function abandonTask() {
      if (confirm('确定要放弃当前任务吗？')) {
        await ipcRenderer.invoke('set-current-task', null);
        gameState.currentTask = null;
        renderAvailableTasks();
        renderCurrentTask();
        showNotification('已放弃委托');
      }
    }

    function renderCompletedTasks() {
      const container = document.getElementById('completedTasks');
      const filtered = filterTasks(gameState.completedTasks);
      
      if (filtered.length === 0) {
        container.innerHTML = '<p style="color: #a08060; text-align: center;">暂无符合条件的修复记录</p>';
        return;
      }

      container.innerHTML = filtered.map((task, displayIdx) => {
        const realIdx = gameState.completedTasks.indexOf(task);
        const tb = task.toolBonus || {};
        const toolUsed = [];
        if (tb.microscopeUsed) toolUsed.push('🔬');
        if (tb.xrayUsed) toolUsed.push('📷');
        if (tb.laserUsed) toolUsed.push('💫');
        if (tb.uvUsed) toolUsed.push('💡');
        
        return `
        <div class="list-item" style="padding: 15px;">
          <div style="display: flex; gap: 15px; flex: 1;">
            <span style="font-size: 48px;">${task.artifact.image}</span>
            <div style="flex: 1;">
              <h4 style="color: #d4af37; margin-bottom: 5px;">
                ${task.title}
                ${toolUsed.length > 0 ? `<span style="margin-left: 8px; font-size: 14px;">${toolUsed.join(' ')}</span>` : ''}
              </h4>
              <p style="font-size: 12px; color: #a08060; margin-bottom: 8px;">
                ${task.artifact.era} · ${task.artifact.material} · ${task.client}
              </p>
              <div class="stars" style="margin-bottom: 5px;">修复质量：${getQualityStars(task.quality)} (${Math.round(task.quality * 100)}%)</div>
              <p style="font-size: 12px; color: #a08060;">
                完成时间：${new Date(task.completedAt).toLocaleString()}
              </p>
              <div style="margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap;">
                <button class="btn" style="padding: 3px 10px; font-size: 11px;" onclick="viewDetailedReview(${realIdx})">📊 详细复盘</button>
                ${task.restorationLog && task.restorationLog.length > 0 ? 
                  `<button class="btn" style="padding: 3px 10px; font-size: 11px;" onclick="viewRestorationLog(${realIdx})">📋 修复日志</button>` : ''}
                ${task.labReports && task.labReports.length > 0 ? 
                  `<button class="btn" style="padding: 3px 10px; font-size: 11px;" onclick="viewTaskReports(${realIdx})">📄 检测报告</button>` : ''}
              </div>
            </div>
          </div>
          <div style="text-align: right;">
            <p style="color: #d4af37;">💰 ${Math.floor(task.baseReward * task.quality).toLocaleString()}</p>
            <p style="color: #4caf50; font-size: 12px;">声望 +${Math.floor(task.reputation * task.quality)}</p>
          </div>
        </div>
      `}).join('');
    }

    function viewDetailedReview(idx) {
      const task = gameState.completedTasks[idx];
      const stepNames = { observe: '观察充分度', clean: '清洁策略', assemble: '拼合精度', fill: '补配效果', color: '上色匹配', protect: '封护稳定性' };
      const tb = task.toolBonus || {};
      const fs = task.forceStats || {};
      const sr = task.stepRatings || {};
      const logs = task.restorationLog || [];
      
      let forceGrade = '一般';
      if (fs.totalActions > 0) {
        const perfectRate = fs.perfectCount / fs.totalActions;
        if (perfectRate >= 0.7) forceGrade = '优秀';
        else if (perfectRate >= 0.4) forceGrade = '良好';
      }
      
      const timelineEvents = generateTimeline(logs, task);
      
      let html = `
        <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">📊 修复复盘 - ${task.title}</h2>
        
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
          <div style="flex: 1; text-align: center;">
            <div style="font-size: 60px;">${task.artifact.image}</div>
            <p style="color: #a08060;">${task.artifact.era} · ${task.artifact.material}</p>
          </div>
          <div style="flex: 2;">
            <p><strong>最终评级：</strong><span class="stars">${getQualityStars(task.quality)}</span> (${Math.round(task.quality * 100)}%)</p>
            <p><strong>获得奖励：</strong><span style="color: #d4af37;">💰 ${Math.floor(task.baseReward * task.quality).toLocaleString()}</span></p>
            <p><strong>获得声望：</strong><span style="color: #4caf50;">⭐ ${Math.floor(task.reputation * task.quality)}</span></p>
            <p><strong>完成时间：</strong>${new Date(task.completedAt).toLocaleString()}</p>
          </div>
        </div>
        
        <div style="margin-bottom: 20px;">
          <h4 style="color: #d4af37; margin-bottom: 10px;">� 关键操作时间线</h4>
          <div style="max-height: 250px; overflow-y: auto; padding-right: 10px;">
            ${timelineEvents.map((event, i) => `
              <div style="display: flex; gap: 12px; margin-bottom: 10px; position: relative;">
                <div style="width: 12px; height: 12px; border-radius: 50%; background: ${event.color}; flex-shrink: 0; margin-top: 4px;"></div>
                <div style="flex: 1;">
                  <div style="font-size: 11px; color: #888; margin-bottom: 2px;">${event.time}</div>
                  <div style="font-size: 12px;">
                    <span style="color: #d4af37;">[${event.step}]</span>
                    <span style="color: ${event.category === '⚠️ 突发' ? '#f44336' : event.color};">${event.icon} ${event.text}</span>
                  </div>
                </div>
              </div>
              ${i < timelineEvents.length - 1 ? '<div style="position: absolute; left: 5px; top: 20px; bottom: -10px; width: 2px; background: #444;"></div>' : ''}
            `).join('')}
          </div>
        </div>
        
        <div style="margin-bottom: 20px;">
          <h4 style="color: #d4af37; margin-bottom: 10px;">�� 阶段评分</h4>
          ${Object.keys(sr).length > 0 ? Object.keys(sr).map(stepId => {
            const r = sr[stepId];
            if (!r || r.maxScore === 0) return '';
            const pct = Math.round((r.score / r.maxScore) * 100);
            return `
              <div style="margin-bottom: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 3px;">
                  <span>${stepNames[stepId] || stepId}</span>
                  <span style="color: ${pct >= 80 ? '#4caf50' : pct >= 60 ? '#ff9800' : '#f44336'};">${r.score}/${r.maxScore} (${pct}%)</span>
                </div>
                <div style="font-size: 11px; color: #a08060;">
                  ${(r.details || []).map(d => `<div>• ${d}</div>`).join('')}
                </div>
              </div>
            `;
          }).join('') : '<p style="color: #a08060; font-size: 12px;">暂无详细阶段评分数据</p>'}
        </div>
        
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
          <div style="flex: 1; padding: 10px; background: rgba(76,175,80,0.1); border-radius: 6px;">
            <p style="color: #4caf50; margin-bottom: 5px;"><strong>🛠️ 高级工具使用</strong></p>
            <p style="font-size: 12px;">
              ${tb.microscopeUsed ? '🔬 显微镜<br>' : ''}
              ${tb.xrayUsed ? '📷 X光透视<br>' : ''}
              ${tb.laserUsed ? '💫 激光清洗<br>' : ''}
              ${tb.uvUsed ? '💡 UV固化<br>' : ''}
              ${!tb.microscopeUsed && !tb.xrayUsed && !tb.laserUsed && !tb.uvUsed ? '仅使用基础工具' : ''}
            </p>
          </div>
          <div style="flex: 1; padding: 10px; background: rgba(212,175,55,0.1); border-radius: 6px;">
            <p style="color: #d4af37; margin-bottom: 5px;"><strong>⚡ 力度控制</strong></p>
            <p style="font-size: 12px;">
              评级：${forceGrade}<br>
              完美 ${fs.perfectCount || 0} 次<br>
              过轻 ${fs.tooLightCount || 0} 次<br>
              过重 ${fs.tooHeavyCount || 0} 次
            </p>
          </div>
          <div style="flex: 1; padding: 10px; background: rgba(244,67,54,0.1); border-radius: 6px;">
            <p style="color: #f44336; margin-bottom: 5px;"><strong>⚠️ 突发事件</strong></p>
            <p style="font-size: 12px;">
              惩罚：-${Math.round((task.emergencyPenalty || 0) * 100)}%<br>
              ${(task.observeDetails || []).length > 0 ? `微观发现：${task.observeDetails.length} 处` : ''}
            </p>
          </div>
        </div>
        
        ${task.observeDetails && task.observeDetails.length > 0 ? `
        <div style="margin-bottom: 20px; padding: 10px; background: rgba(255,215,0,0.1); border-radius: 6px;">
          <p style="color: #ffd700; margin-bottom: 5px;"><strong>🔬 显微镜发现</strong></p>
          <p style="font-size: 12px;">${task.observeDetails.join('、')}</p>
        </div>
        ` : ''}
        
        ${task.apprenticeContribution ? `
        <div style="margin-bottom: 20px; padding: 10px; background: rgba(76,175,80,0.1); border-radius: 6px;">
          <p style="color: #4caf50; margin-bottom: 5px;"><strong>👨‍🔧 学徒贡献</strong></p>
          <p style="font-size: 12px;">
            ${task.apprenticeContribution.apprenticeName} 协助完成<br>
            获得经验：+${task.apprenticeContribution.expGained}
          </p>
        </div>
        ` : ''}
        
        ${task.labReports && task.labReports.length > 0 ? `
        <div style="margin-bottom: 20px; padding: 10px; background: rgba(100,200,255,0.1); border-radius: 6px;">
          <p style="color: #64c8ff; margin-bottom: 5px;"><strong>📄 检测报告</strong></p>
          <p style="font-size: 12px;">
            ${task.labReports.map(r => r.type).join('、')}
          </p>
        </div>
        ` : ''}
        
        <div style="text-align: center;">
          <button class="btn" onclick="closeModal()">关闭</button>
        </div>
      `;
      
      showModal(html);
    }

    function generateTimeline(logs, task) {
      const events = [];
      const categoryIcons = {
        '系统': '📋',
        '观察': '👁️',
        '清洁': '🧹',
        '拼合': '🧩',
        '补配': '🔨',
        '上色': '🎨',
        '封护': '🛡️',
        '材料': '📦',
        '⚠️ 突发': '⚠️',
        '学徒协助': '👨‍🔧'
      };
      const categoryColors = {
        '系统': '#888',
        '观察': '#ffd700',
        '清洁': '#4caf50',
        '拼合': '#2196f3',
        '补配': '#ff9800',
        '上色': '#9c27b0',
        '封护': '#607d8b',
        '材料': '#795548',
        '⚠️ 突发': '#f44336',
        '学徒协助': '#8bc34a'
      };
      
      logs.forEach(log => {
        const text = log.text || '';
        if (text.includes('开始修复任务') || text.includes('发现破损点') || 
            text.includes('切换至') || text.includes('污渍已清洁') ||
            text.includes('碎片已放置') || text.includes('补配完成') ||
            text.includes('上色完成') || text.includes('封护完成') ||
            text.includes('突发事件') || text.includes('成功避免') ||
            text.includes('协助识别') || text.includes('使用')) {
          events.push({
            time: log.time,
            step: log.step,
            category: log.category,
            icon: categoryIcons[log.category] || '📌',
            color: categoryColors[log.category] || '#e8d5b7',
            text: text
          });
        }
      });
      
      if (task.labReports && task.labReports.length > 0) {
        task.labReports.forEach(report => {
          events.push({
            time: new Date(report.timestamp || Date.now()).toLocaleTimeString(),
            step: '检测',
            category: '系统',
            icon: '📄',
            color: '#64c8ff',
            text: `完成${report.type}`
          });
        });
      }
      
      if (events.length === 0) {
        events.push({
          time: '--:--:--',
          step: '记录',
          category: '系统',
          icon: '📋',
          color: '#888',
          text: '暂无详细操作记录'
        });
      }
      
      return events.slice(0, 20);
    }

    function viewRestorationLog(idx) {
      const task = gameState.completedTasks[idx];
      if (!task.restorationLog || task.restorationLog.length === 0) return;
      
      showModal(`
        <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">📋 修复日志 - ${task.title}</h2>
        <div style="max-height: 400px; overflow-y: auto;">
          ${task.restorationLog.map(log => `
            <div style="font-size: 12px; margin-bottom: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px;">
              <span style="color: #888;">[${log.time}]</span>
              <span style="color: #d4af37;">[${log.step}]</span>
              <span style="color: ${log.category === '⚠️ 突发' ? '#f44336' : '#e8d5b7'};">${log.category}:</span>
              ${log.text}
            </div>
          `).join('')}
        </div>
        <div style="text-align: center; margin-top: 20px;">
          <button class="btn" onclick="closeModal()">关闭</button>
        </div>
      `);
    }

    function viewTaskReports(idx) {
      const task = gameState.completedTasks[idx];
      if (!task.labReports || task.labReports.length === 0) return;
      
      showModal(`
        <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">📄 检测报告 - ${task.title}</h2>
        <div style="max-height: 400px; overflow-y: auto;">
          ${task.labReports.map(r => `
            <div class="card" style="background: rgba(0,0,0,0.2); margin-bottom: 15px;">
              <h4 style="color: #d4af37; margin-bottom: 10px;">${r.type} - ${new Date(r.timestamp).toLocaleString()}</h4>
              <pre style="font-size: 12px; white-space: pre-wrap; font-family: inherit;">${r.content}</pre>
            </div>
          `).join('')}
        </div>
        <div style="text-align: center; margin-top: 20px;">
          <button class="btn" onclick="closeModal()">关闭</button>
        </div>
      `);
    }

    function showModal(content) {
      const modal = document.createElement('div');
      modal.className = 'modal';
      modal.id = 'archiveModal';
      modal.innerHTML = `<div class="modal-content">${content}</div>`;
      modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
      document.body.appendChild(modal);
    }

    function closeModal() {
      document.getElementById('archiveModal')?.remove();
    }

    function showNotification(message, type = 'success') {
      const container = document.getElementById('notificationContainer');
      const notif = document.createElement('div');
      notif.className = 'notification' + (type === 'error' ? ' error' : '');
      notif.textContent = message;
      container.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    init();
    setInterval(async () => {
      gameState = await getGameState();
      updateStatus();
      renderCurrentTask();
      renderCompletedTasks();
    }, 2000);
  </script>
</body>
</html>
