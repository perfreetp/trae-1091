<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>材料柜</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="header">
    <h1>🧪 材料柜</h1>
    <div class="status-bar">
      <div class="status-item">
        <span class="status-icon">💰</span>
        <span class="status-value" id="budget">50,000</span>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('inventory')">📦 库存管理</button>
      <button class="tab" onclick="switchTab('shop')">🛒 材料商店</button>
      <button class="tab" onclick="switchTab('mix')">⚗️ 材料调配</button>
      <button class="tab" onclick="switchTab('tools')">🔧 工具解锁</button>
    </div>

    <div id="inventoryTab">
      <div class="card">
        <div class="card-title">📦 基础材料</div>
        <div class="grid-3" id="baseMaterialsGrid"></div>
      </div>
      <div class="card" style="margin-top: 20px;">
        <div class="card-title">✨ 合成材料</div>
        <div class="grid-3" id="mixedMaterialsGrid"></div>
      </div>
    </div>

    <div id="shopTab" style="display: none;">
      <div class="card">
        <div class="card-title">🛒 材料商店</div>
        <p style="margin-bottom: 15px; color: #a08060;">购买修复所需的各种基础材料</p>
        <div class="grid-3" id="shopGrid"></div>
      </div>
    </div>

    <div id="mixTab" style="display: none;">
      <div class="card">
        <div class="card-title">⚗️ 材料调配台</div>
        <p style="margin-bottom: 15px; color: #a08060;">选择两种基础材料进行调配，可合成高级材料（无论成功失败都会消耗原料）</p>
        <div class="grid-2">
          <div>
            <h3 style="color: #d4af37; margin-bottom: 15px;">📋 配方表</h3>
            <div id="recipeList"></div>
          </div>
          <div>
            <h3 style="color: #d4af37; margin-bottom: 15px;">🎯 调配操作</h3>
            <div style="margin-bottom: 15px;">
              <h4 style="color: #e8d5b7; margin-bottom: 10px;">选择原料 1</h4>
              <div id="ingredient1Select" class="grid-3"></div>
            </div>
            <div style="margin-bottom: 15px;">
              <h4 style="color: #e8d5b7; margin-bottom: 10px;">选择原料 2</h4>
              <div id="ingredient2Select" class="grid-3"></div>
            </div>
            <div class="mixing-bowl">
              <span class="mixture" id="mixBowlIcon">🧪</span>
            </div>
            <div id="mixResult" style="text-align: center; margin-bottom: 15px;">
              <p style="color: #a08060;">选择两种材料开始调配</p>
            </div>
            <div style="text-align: center;">
              <button class="btn btn-primary" onclick="doMix()" id="mixBtn" disabled>开始调配</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="toolsTab" style="display: none;">
      <div class="card">
        <div class="card-title">🔧 专业工具</div>
        <p style="margin-bottom: 15px; color: #a08060;">解锁高级修复工具，提高修复效率和质量（解锁后在修复台对应步骤可用）</p>
        <div class="grid-3" id="toolsGrid"></div>
      </div>
    </div>
  </div>

  <div id="notificationContainer"></div>

  <script src="../data/game-data.js"></script>
  <script>
    const { ipcRenderer } = require('electron');
    let gameState = null;
    let selectedIngredient1 = null;
    let selectedIngredient2 = null;

    async function init() {
      gameState = await getGameState();
      updateStatus();
      renderInventory();
      renderShop();
      renderRecipes();
      renderIngredientSelects();
      renderTools();
    }

    function updateStatus() {
      document.getElementById('budget').textContent = gameState.budget.toLocaleString();
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      
      ['inventory', 'shop', 'mix', 'tools'].forEach(t => {
        document.getElementById(t + 'Tab').style.display = t === tabName ? 'block' : 'none';
      });
    }

    function renderInventory() {
      const materialsInfo = getMaterialsInfo();
      
      const baseGrid = document.getElementById('baseMaterialsGrid');
      const baseMaterials = Object.entries(gameState.materials).filter(([k]) => materialsInfo[k]?.category === 'base');
      baseGrid.innerHTML = baseMaterials.map(([key, amount]) => {
        const info = materialsInfo[key];
        return `
          <div class="item-card">
            <div class="item-icon">${getMaterialIcon(key)}</div>
            <div class="item-name">${info?.name || key}</div>
            <div class="item-meta">库存：${amount} ${info?.unit || ''}</div>
            <div class="item-meta" style="margin-top: 5px; font-size: 10px;">${info?.description || ''}</div>
          </div>
        `;
      }).join('');

      const mixedGrid = document.getElementById('mixedMaterialsGrid');
      const mixedMaterials = Object.entries(gameState.materials).filter(([k]) => materialsInfo[k]?.category === 'mixed');
      mixedGrid.innerHTML = mixedMaterials.map(([key, amount]) => {
        const info = materialsInfo[key];
        return `
          <div class="item-card" style="border-color: #d4af37;">
            <div class="item-icon" style="color: #d4af37;">${getMaterialIcon(key)}</div>
            <div class="item-name" style="color: #d4af37;">${info?.name || key}</div>
            <div class="item-meta">库存：${amount} ${info?.unit || ''}</div>
            <div class="item-meta" style="margin-top: 5px; font-size: 10px;">${info?.description || ''}</div>
          </div>
        `;
      }).join('');
    }

    function renderShop() {
      const grid = document.getElementById('shopGrid');
      const materialsInfo = getMaterialsInfo();
      const baseMaterials = Object.entries(materialsInfo).filter(([k, v]) => v.category === 'base');
      
      grid.innerHTML = baseMaterials.map(([key, info]) => `
        <div class="item-card">
          <div class="item-icon">${getMaterialIcon(key)}</div>
          <div class="item-name">${info.name}</div>
          <div class="item-meta">${info.description}</div>
          <div style="text-align: center; margin-top: 10px;">
            <p style="color: #d4af37; margin-bottom: 8px;">💰 ${info.price}/${info.unit}</p>
            <p style="font-size: 11px; color: #a08060; margin-bottom: 8px;">当前库存：${gameState.materials[key] || 0}</p>
            <div style="display: flex; gap: 5px; justify-content: center;">
              <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="buyMaterial('${key}', 1)">买1</button>
              <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="buyMaterial('${key}', 5)">买5</button>
              <button class="btn" style="padding: 5px 10px; font-size: 12px;" onclick="buyMaterial('${key}', 10)">买10</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function buyMaterial(key, amount) {
      const info = getMaterialsInfo()[key];
      const cost = info.price * amount;
      const result = await ipcRenderer.invoke('buy-material', key, amount, cost);
      if (result.success) {
        gameState = result;
        updateStatus();
        renderInventory();
        renderShop();
        renderIngredientSelects();
        showNotification(`购买成功：${info.name} x${amount}`);
      } else {
        showNotification('余额不足！', 'error');
      }
    }

    function renderRecipes() {
      const container = document.getElementById('recipeList');
      const recipes = getMixRecipes();
      const materialsInfo = getMaterialsInfo();
      
      container.innerHTML = recipes.map(recipe => `
        <div class="list-item">
          <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 20px;">${getMaterialIcon(recipe.ingredients[0])}</span>
            <span style="color: #d4af37;">+</span>
            <span style="font-size: 20px;">${getMaterialIcon(recipe.ingredients[1])}</span>
            <span style="color: #d4af37; margin: 0 5px;">=</span>
            <span style="font-size: 20px;">✨</span>
          </div>
          <div style="text-align: right;">
            <div style="color: #d4af37;">${recipe.resultName}</div>
            <div style="font-size: 11px; color: #4caf50;">${recipe.effect}</div>
          </div>
        </div>
      `).join('');
    }

    function renderIngredientSelects() {
      const materialsInfo = getMaterialsInfo();
      const baseMaterials = Object.entries(materialsInfo).filter(([k, v]) => v.category === 'base');
      
      const renderOption = (num, selected) => baseMaterials.map(([key, info]) => {
        const hasStock = (gameState.materials[key] || 0) > 0;
        return `
          <div class="item-card ${selected === key ? 'selected' : ''}" 
               style="cursor: pointer; ${hasStock ? '' : 'opacity: 0.4;'}"
               onclick="${hasStock ? `selectIngredient(${num}, '${key}')` : ''}">
            <div class="item-icon">${getMaterialIcon(key)}</div>
            <div class="item-name">${info.name}</div>
            <div class="item-meta">库存：${gameState.materials[key] || 0}</div>
          </div>
        `;
      }).join('');

      document.getElementById('ingredient1Select').innerHTML = renderOption(1, selectedIngredient1);
      document.getElementById('ingredient2Select').innerHTML = renderOption(2, selectedIngredient2);
      
      updateMixPreview();
    }

    function selectIngredient(num, key) {
      if (num === 1) {
        selectedIngredient1 = key;
      } else {
        selectedIngredient2 = key;
      }
      renderIngredientSelects();
    }

    function updateMixPreview() {
      const bowlEl = document.getElementById('mixBowlIcon');
      const resultEl = document.getElementById('mixResult');
      const mixBtn = document.getElementById('mixBtn');
      const recipes = getMixRecipes();
      
      if (!selectedIngredient1 && !selectedIngredient2) {
        bowlEl.textContent = '🧪';
        resultEl.innerHTML = '<p style="color: #a08060;">选择两种材料开始调配</p>';
        mixBtn.disabled = true;
      } else if (!selectedIngredient1 || !selectedIngredient2) {
        bowlEl.textContent = selectedIngredient1 ? getMaterialIcon(selectedIngredient1) : getMaterialIcon(selectedIngredient2);
        resultEl.innerHTML = '<p style="color: #a08060;">再选择一种材料</p>';
        mixBtn.disabled = true;
      } else {
        const recipe = recipes.find(r => 
          (r.ingredients[0] === selectedIngredient1 && r.ingredients[1] === selectedIngredient2) ||
          (r.ingredients[0] === selectedIngredient2 && r.ingredients[1] === selectedIngredient1)
        );
        if (recipe) {
          bowlEl.textContent = '✨';
          resultEl.innerHTML = `
            <p style="color: #4caf50; font-weight: bold;">发现配方：${recipe.resultName}</p>
            <p style="color: #4caf50; font-size: 12px;">${recipe.effect}</p>
          `;
          mixBtn.disabled = false;
        } else {
          bowlEl.textContent = '❓';
          resultEl.innerHTML = `
            <p style="color: #ff9800;">未知配方，可能调配失败</p>
            <p style="color: #ff9800; font-size: 12px;">原料仍会被消耗</p>
          `;
          mixBtn.disabled = false;
        }
      }
    }

    async function doMix() {
      if (!selectedIngredient1 || !selectedIngredient2) return;
      
      const recipes = getMixRecipes();
      const recipe = recipes.find(r => 
        (r.ingredients[0] === selectedIngredient1 && r.ingredients[1] === selectedIngredient2) ||
        (r.ingredients[0] === selectedIngredient2 && r.ingredients[1] === selectedIngredient1)
      );

      if (recipe) {
        const result = await ipcRenderer.invoke('mix-materials', selectedIngredient1, selectedIngredient2, recipe.resultKey);
        if (result.success) {
          gameState.materials = result.materials;
          showNotification(`调配成功！获得：${recipe.resultName}`);
        } else {
          showNotification(result.message || '调配失败', 'error');
        }
      } else {
        await ipcRenderer.invoke('use-material', selectedIngredient1, 1);
        await ipcRenderer.invoke('use-material', selectedIngredient2, 1);
        gameState = await getGameState();
        showNotification('调配失败！原料已浪费...', 'error');
      }

      selectedIngredient1 = null;
      selectedIngredient2 = null;
      updateStatus();
      renderInventory();
      renderIngredientSelects();
    }

    function renderTools() {
      const grid = document.getElementById('toolsGrid');
      const toolsInfo = getToolsInfo();
      grid.innerHTML = Object.entries(gameState.tools).map(([key, tool]) => {
        const info = toolsInfo[key];
        const useInStep = getToolUseStep(key);
        return `
          <div class="item-card ${tool.unlocked ? '' : ''}" style="${tool.unlocked ? 'border-color: #4caf50;' : ''}">
            <div class="item-icon">${getToolIcon(key)}</div>
            <div class="item-name">${info?.name || key}</div>
            <div class="item-meta" style="font-size: 11px;">${info?.description || ''}</div>
            <div class="item-meta" style="margin-top: 5px; font-size: 10px; color: #d4af37;">
              用于：${useInStep}
            </div>
            <div style="text-align: center; margin-top: 10px;">
              ${tool.unlocked 
                ? `<p style="color: #4caf50;">✅ 已解锁 (Lv.${tool.level})</p>`
                : `<p style="color: #d4af37; margin-bottom: 8px;">💰 ${info?.unlockCost?.toLocaleString() || 0}</p>
                   <button class="btn btn-primary" style="padding: 5px 15px; font-size: 12px;" onclick="unlockTool('${key}')">解锁</button>`
              }
            </div>
          </div>
        `;
      }).join('');
    }

    function getToolUseStep(toolKey) {
      const map = {
        softBrush: '清洁阶段',
        scalpel: '清洁阶段',
        microscope: '观察阶段',
        laserCleaner: '清洁阶段',
        uvLamp: '封护阶段',
        xrayMachine: '观察阶段'
      };
      return map[toolKey] || '通用';
    }

    async function unlockTool(key) {
      const toolsInfo = getToolsInfo();
      const cost = toolsInfo[key].unlockCost;
      const result = await ipcRenderer.invoke('unlock-tool', key, cost);
      if (result.success) {
        gameState = result;
        updateStatus();
        renderTools();
        await ipcRenderer.invoke('refresh-all-windows');
        showNotification(`解锁成功：${toolsInfo[key].name}！修复台中已可用`);
      } else {
        showNotification('余额不足！', 'error');
      }
    }

    function getMaterialIcon(key) {
      const icons = {
        cleaningSolution: '🧴',
        adhesive: '🫙',
        filler: '🧱',
        pigment: '🎨',
        varnish: '💧',
        solvent: '⚗️',
        strongCleaner: '💪',
        strongAdhesive: '🔗',
        colorVarnish: '🌈',
        paintRemover: '🧼',
        softFiller: '☁️'
      };
      return icons[key] || '📦';
    }

    function getToolIcon(key) {
      const icons = {
        softBrush: '🖌️',
        scalpel: '🔪',
        microscope: '🔬',
        laserCleaner: '💫',
        uvLamp: '💡',
        xrayMachine: '📷'
      };
      return icons[key] || '🔧';
    }

    function showNotification(message, type = 'success') {
      const container = document.getElementById('notificationContainer');
      const notif = document.createElement('div');
      notif.className = 'notification' + (type === 'error' ? ' error' : '');
      notif.textContent = message;
      container.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    init();
    setInterval(async () => {
      gameState = await getGameState();
      updateStatus();
      renderInventory();
    }, 2000);
  </script>
</body>
</html>
