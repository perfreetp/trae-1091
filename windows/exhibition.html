<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>展厅布置</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="header">
    <h1>🖼️ 展厅布置</h1>
    <div class="status-bar">
      <div class="status-item">
        <span class="status-icon">⭐</span>
        <span class="status-value" id="rating">0</span>
      </div>
      <div class="status-item">
        <span class="status-icon">👥</span>
        <span class="status-value" id="visitors">0</span>
      </div>
    </div>
  </div>

  <div class="main-container">
    <div class="grid-2">
      <div class="card">
        <div class="card-title">
          🏛️ 展厅布局
          <span style="float: right; color: #d4af37;">展厅评级：<span class="stars" id="starRating">☆☆☆☆☆</span></span>
        </div>
        <p style="margin-bottom: 15px; color: #a08060;">点击展柜放置或移除展品</p>
        <div class="exhibition-grid" id="showcases"></div>
      </div>

      <div>
        <div class="card">
          <div class="card-title">📦 可展藏品</div>
          <p style="margin-bottom: 10px; color: #a08060;">已修复的文物可以在这里展出</p>
          <div id="collectionList" style="max-height: 250px; overflow-y: auto;"></div>
        </div>

        <div class="card" style="margin-top: 20px;">
          <div class="card-title">💬 观众反馈</div>
          <div id="feedbackList" style="max-height: 200px; overflow-y: auto;"></div>
          <div style="margin-top: 10px; text-align: center;">
            <button class="btn" onclick="simulateVisitors()">👥 模拟观众参观</button>
          </div>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top: 20px;">
      <div class="card-title">📊 展厅统计</div>
      <div class="grid-3">
        <div class="item-card" style="text-align: center;">
          <div style="font-size: 36px; margin-bottom: 5px;">🖼️</div>
          <div class="item-name">展品数量</div>
          <div class="item-meta" id="itemCount">0 件</div>
        </div>
        <div class="item-card" style="text-align: center;">
          <div style="font-size: 36px; margin-bottom: 5px;">🌈</div>
          <div class="item-name">年代多样性</div>
          <div class="item-meta" id="eraCount">0 个</div>
        </div>
        <div class="item-card" style="text-align: center;">
          <div style="font-size: 36px; margin-bottom: 5px;">⭐</div>
          <div class="item-name">平均稀有度</div>
          <div class="item-meta" id="avgRarity">0 ★</div>
        </div>
      </div>
    </div>
  </div>

  <div id="notificationContainer"></div>

  <script src="../data/game-data.js"></script>
  <script>
    const { ipcRenderer } = require('electron');
    let gameState = null;
    let selectedArtifact = null;
    const SHOWCASE_POSITIONS = 8;

    const FEEDBACK_TEMPLATES = {
      highQuality: [
        '{name}修复得太棒了！完全看不出修复痕迹，技术真是一流！',
        '{name}的细节保存得太完美了，连{detail}都清晰可见，专业！',
        '被{name}深深震撼，博物馆修复师太强了，{detail}处理得太到位了！',
        '{name}的光泽和纹理都恢复得恰到好处，简直像新的一样！',
        '看到{name}让我感受到了历史的温度，修复得真好，{detail}清晰可见！',
        '一定要看{name}！修复质量太高了，完全看不出经过修复！'
      ],
      mediumQuality: [
        '{name}挺有意思的，整体还不错，就是{detail}稍微有点痕迹',
        '{name}能看出一点修复痕迹，但不影响观赏，整体可以接受',
        '{name}的展示效果一般，{detail}处理得还行吧',
        '{name}值得一看，希望{detail}能处理得更精致些',
        '{name}的修复中规中矩，{detail}还算自然'
      ],
      lowQuality: [
        '{name}的修复痕迹有点明显，{detail}一看就是补过的，有点遗憾',
        '感觉{name}还有提升空间，{detail}处理得不够细腻',
        '{name}的色泽不太自然，{detail}的色差有点明显，希望能改进',
        '{name}看起来修复得比较粗糙，{detail}一眼就能看出来',
        '{name}的{detail}处理得不太好，有点破坏整体美感'
      ],
      general: [
        '这些文物太精美了！真是大开眼界！',
        '展柜布置得很有艺术感',
        '灯光效果很棒，很有氛围感',
        '不虚此行！强烈推荐！',
        '带孩子来的，学到了很多知识'
      ]
    };
    
    const DETAIL_BY_MATERIAL = {
      '青铜': ['纹饰', '铭文', '锈层', '包浆', '足部'],
      '瓷器': ['釉面', '冲线', '开片', '底足', '口沿'],
      '绢本设色': ['颜料', '纤维', '折痕', '落款', '印章'],
      '纸本': ['纸张', '墨迹', '折痕', '印章', '落款'],
      '陶器': ['彩绘', '胎质', '纹饰', '口沿', '底部'],
      '漆器': ['漆层', '彩绘', '胎骨', '纹饰', '边缘'],
      '和田玉': ['沁色', '绺裂', '光泽', '纹饰', '抛光'],
      '铜': ['铜绿', '纹饰', '包浆', '焊点', '表面']
    };

    async function init() {
      gameState = await getGameState();
      renderShowcases();
      renderCollection();
      renderFeedback();
      updateStats();
    }

    function renderShowcases() {
      const container = document.getElementById('showcases');
      const items = gameState.exhibition.items;
      const feedback = gameState.exhibition.visitorFeedback || [];
      
      let html = '';
      for (let i = 0; i < SHOWCASE_POSITIONS; i++) {
        const exhibit = items.find(e => e.position === i);
        if (exhibit) {
          const quality = exhibit.artifact.restorationQuality || 0.7;
          const qualityStars = '★'.repeat(Math.round(quality * 5)) + '☆'.repeat(5 - Math.round(quality * 5));
          const qualityColor = quality >= 0.85 ? '#4caf50' : quality >= 0.6 ? '#ff9800' : '#f44336';
          
          const artifactFeedback = feedback.filter(f => f.artifactId === exhibit.artifact.id).slice(-3);
          const hasRisk = quality < 0.5;
          const showcaseBorder = hasRisk ? 'border-color: #f44336;' : quality >= 0.85 ? 'border-color: #4caf50;' : '';
          
          html += `
            <div class="showcase occupied" style="${showcaseBorder} cursor: pointer;" onclick="viewExhibitDetail(${i})">
              <div class="showcase-icon">${exhibit.artifact.image}</div>
              <div class="showcase-label">${exhibit.artifact.name}</div>
              <div class="showcase-label">
                <span class="tag tag-era" style="font-size: 10px;">${exhibit.artifact.era}</span>
              </div>
              <div style="font-size: 10px; color: ${qualityColor}; margin-top: 3px;">
                修复：${qualityStars}
                ${hasRisk ? '<span style="color: #f44336;"> ⚠️</span>' : ''}
              </div>
            </div>
          `;
        } else {
          html += `
            <div class="showcase" onclick="placeToShowcase(${i})">
              <div class="showcase-icon" style="opacity: 0.3;">📦</div>
              <div class="showcase-label">展柜 ${i + 1}</div>
              <div class="showcase-label">点击放置</div>
            </div>
          `;
        }
      }
      container.innerHTML = html;

      const rating = gameState.exhibition.rating || 0;
      const stars = '★'.repeat(rating) + '☆'.repeat(5 - rating);
      document.getElementById('starRating').textContent = stars;
      document.getElementById('rating').textContent = rating;
    }

    function viewExhibitDetail(position) {
      const exhibit = gameState.exhibition.items.find(e => e.position === position);
      if (!exhibit) return;
      
      const artifact = exhibit.artifact;
      const quality = artifact.restorationQuality || 0.7;
      const qualityStars = '★'.repeat(Math.round(quality * 5)) + '☆'.repeat(5 - Math.round(quality * 5));
      const feedback = gameState.exhibition.visitorFeedback || [];
      const artifactFeedback = feedback.filter(f => f.artifactId === artifact.id).slice(-5);
      
      const qualityText = quality >= 0.85 ? '优秀 - 几乎看不出修复痕迹' : 
                          quality >= 0.7 ? '良好 - 修复痕迹不明显' :
                          quality >= 0.5 ? '一般 - 有可见修复痕迹' : '较差 - 修复痕迹明显';
      
      const riskText = quality < 0.5 ? '存在未处理风险，建议重新修复' : 
                       quality < 0.7 ? '状态一般，建议定期检查' : '状态良好，可长期展出';
      
      const completedTask = gameState.completedTasks.find(t => t.artifact.id === artifact.id);
      
      let html = `
        <h2 style="color: #d4af37; text-align: center; margin-bottom: 20px;">🖼️ 展品详情 - ${artifact.name}</h2>
        
        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
          <div style="flex: 1; text-align: center;">
            <div style="font-size: 80px;">${artifact.image}</div>
            <p style="color: #a08060; margin-top: 10px;">${artifact.era} · ${artifact.material}</p>
          </div>
          <div style="flex: 2;">
            <h3 style="color: #d4af37; margin-bottom: 10px;">${artifact.name}</h3>
            <p style="margin-bottom: 8px;"><strong>修复质量：</strong><span class="stars">${qualityStars}</span> (${Math.round(quality * 100)}%)</p>
            <p style="margin-bottom: 8px; color: ${quality >= 0.7 ? '#4caf50' : '#ff9800'};">${qualityText}</p>
            <p style="margin-bottom: 8px; color: ${quality < 0.5 ? '#f44336' : '#a08060'};"><strong>状态评估：</strong>${riskText}</p>
            <p style="font-size: 12px; color: #a08060;">${artifact.description}</p>
          </div>
        </div>
        
        <div style="margin-bottom: 20px;">
          <h4 style="color: #d4af37; margin-bottom: 10px;">💬 观众评价（关于这件展品）</h4>
          ${artifactFeedback.length > 0 ? artifactFeedback.map(f => `
            <div style="padding: 8px; background: rgba(0,0,0,0.2); border-radius: 6px; margin-bottom: 8px;">
              <div class="stars" style="font-size: 12px;">${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}</div>
              <p style="font-size: 12px; margin: 5px 0 0;">${f.text}</p>
              <p style="font-size: 10px; color: #666; margin: 0;">${f.time}</p>
            </div>
          `).join('') : '<p style="color: #a08060; font-size: 12px;">暂无针对这件展品的评价</p>'}
        </div>
        
        <div style="display: flex; gap: 10px; justify-content: center;">
          ${completedTask ? `<button class="btn btn-primary" onclick="openArtifactArchive('${completedTask.artifact.id}')">📊 查看修复档案</button>` : ''}
          <button class="btn" onclick="removeExhibit(${position})">📦 撤下展品</button>
          <button class="btn" onclick="closeModal()">关闭</button>
        </div>
      `;
      
      showModal(html);
    }

    async function openArtifactArchive(artifactId) {
      closeModal();
      await ipcRenderer.invoke('open-archives');
      setTimeout(() => {
        ipcRenderer.invoke('highlight-archive', artifactId);
      }, 500);
    }

    function renderCollection() {
      const container = document.getElementById('collectionList');
      const collection = gameState.collection;
      const exhibitedIds = gameState.exhibition.items.map(e => e.artifact.id);
      
      if (collection.length === 0) {
        container.innerHTML = '<p style="color: #a08060; text-align: center; padding: 20px;">暂无已修复的藏品</p>';
        return;
      }

      const available = collection.filter(a => !exhibitedIds.includes(a.id));
      
      if (available.length === 0) {
        container.innerHTML = '<p style="color: #a08060; text-align: center; padding: 20px;">所有藏品已展出</p>';
        return;
      }

      container.innerHTML = available.map(art => `
        <div class="list-item ${selectedArtifact?.id === art.id ? 'selected' : ''}" 
             style="cursor: pointer;"
             onclick="selectArtifact('${art.id}')">
          <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 28px;">${art.image}</span>
            <div>
              <div style="color: #d4af37;">${art.name}</div>
              <div style="font-size: 11px;">
                <span class="tag tag-era">${art.era}</span>
                <span class="tag tag-difficulty">${'★'.repeat(art.rarity)}</span>
              </div>
            </div>
          </div>
          <span>▶</span>
        </div>
      `).join('');
    }

    function selectArtifact(id) {
      selectedArtifact = gameState.collection.find(a => a.id === id);
      renderCollection();
      showNotification('已选择：' + selectedArtifact.name + '，点击展柜放置');
    }

    async function placeToShowcase(position) {
      if (!selectedArtifact) {
        showNotification('请先选择要展出的藏品！', 'error');
        return;
      }

      const result = await ipcRenderer.invoke('exhibit-item', selectedArtifact, position);
      if (result.success) {
        gameState.exhibition = result.exhibition;
        selectedArtifact = null;
        renderShowcases();
        renderCollection();
        updateStats();
        showNotification('展品已放置！');
      } else {
        showNotification(result.message || '放置失败', 'error');
      }
    }

    async function removeExhibit(position) {
      if (confirm('确定要移除此展品吗？')) {
        const result = await ipcRenderer.invoke('remove-exhibit', position);
        if (result.success) {
          gameState.exhibition = result.exhibition;
          renderShowcases();
          renderCollection();
          updateStats();
          showNotification('展品已移除');
        }
      }
    }

    function renderFeedback() {
      const container = document.getElementById('feedbackList');
      const feedback = gameState.exhibition.visitorFeedback;
      
      if (feedback.length === 0) {
        container.innerHTML = '<p style="color: #a08060; text-align: center; padding: 20px;">暂无观众反馈</p>';
        return;
      }

      container.innerHTML = feedback.slice(-10).reverse().map(f => `
        <div class="feedback-item">
          <div class="feedback-text">${f.text}</div>
          <div class="feedback-rating">
            <span class="stars">${'★'.repeat(f.rating)}${'☆'.repeat(5 - f.rating)}</span>
            <span style="margin-left: 10px; color: #666; font-size: 11px;">${f.time}</span>
          </div>
        </div>
      `).join('');
    }

    async function simulateVisitors() {
      if (gameState.exhibition.items.length === 0) {
        showNotification('展厅还没有展品！', 'error');
        return;
      }

      const visitorCount = Math.floor(Math.random() * 20) + 5;
      const feedbackCount = Math.floor(visitorCount * 0.4);
      
      let totalRatingBoost = 0;
      const items = gameState.exhibition.items;
      
      for (let i = 0; i < feedbackCount; i++) {
        let feedback;
        
        if (Math.random() < 0.6 && items.length > 0) {
          const randomItem = items[Math.floor(Math.random() * items.length)];
          const quality = randomItem.artifact.restorationQuality || 0.7;
          
          let templateList, baseRating;
          if (quality >= 0.85) {
            templateList = FEEDBACK_TEMPLATES.highQuality;
            baseRating = 5;
            totalRatingBoost += 1;
          } else if (quality >= 0.6) {
            templateList = FEEDBACK_TEMPLATES.mediumQuality;
            baseRating = 4;
          } else {
            templateList = FEEDBACK_TEMPLATES.lowQuality;
            baseRating = 2;
            totalRatingBoost -= 1;
          }
          
          const template = templateList[Math.floor(Math.random() * templateList.length)];
          const details = DETAIL_BY_MATERIAL[randomItem.artifact.material] || ['细节', '工艺', '表面'];
          const detail = details[Math.floor(Math.random() * details.length)];
          const text = template.replace('{name}', randomItem.artifact.name).replace('{detail}', detail);
          
          feedback = {
            text,
            rating: Math.max(1, Math.min(5, baseRating + (Math.random() > 0.5 ? 0 : -1))),
            time: new Date().toLocaleTimeString(),
            artifactId: randomItem.artifact.id
          };
        } else {
          const template = FEEDBACK_TEMPLATES.general[Math.floor(Math.random() * FEEDBACK_TEMPLATES.general.length)];
          feedback = {
            text: template,
            rating: 4 + Math.floor(Math.random() * 2),
            time: new Date().toLocaleTimeString()
          };
        }
        
        await ipcRenderer.invoke('add-feedback', feedback);
        gameState.exhibition.visitorFeedback.push(feedback);
      }

      const currentVisitors = parseInt(document.getElementById('visitors').textContent) + visitorCount;
      document.getElementById('visitors').textContent = currentVisitors;
      
      const avgQuality = items.length > 0 
        ? items.reduce((sum, e) => sum + (e.artifact.restorationQuality || 0.7), 0) / items.length 
        : 0.7;
      const exhibitionRating = Math.min(5, Math.max(1, Math.round(avgQuality * 5)));
      await ipcRenderer.invoke('update-exhibition-rating', exhibitionRating);

      renderFeedback();
      renderShowcases();
      showNotification(`迎来 ${visitorCount} 位观众，收到 ${feedbackCount} 条评价！`);
    }

    function updateStats() {
      const items = gameState.exhibition.items;
      document.getElementById('itemCount').textContent = items.length + ' 件';
      
      const eras = [...new Set(items.map(e => e.artifact.era))];
      document.getElementById('eraCount').textContent = eras.length + ' 个';
      
      if (items.length > 0) {
        const avgRarity = items.reduce((sum, e) => sum + (e.artifact.rarity || 1), 0) / items.length;
        document.getElementById('avgRarity').textContent = avgRarity.toFixed(1) + ' ★';
      } else {
        document.getElementById('avgRarity').textContent = '0 ★';
      }
    }

    function showNotification(message, type = 'success') {
      const container = document.getElementById('notificationContainer');
      const notif = document.createElement('div');
      notif.className = 'notification' + (type === 'error' ? ' error' : '');
      notif.textContent = message;
      container.appendChild(notif);
      setTimeout(() => notif.remove(), 3000);
    }

    init();
    setInterval(async () => {
      gameState = await getGameState();
      renderShowcases();
      updateStats();
    }, 3000);
  </script>
</body>
</html>
